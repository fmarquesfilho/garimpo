openapi: 3.1.0
info:
  title: Garimpei API
  description: |
    API do Garimpei — curadoria inteligente de produtos de afiliados Shopee.

    **v1 (Go legado):** Rotas `/api/*` servidas pelo monólito Go. Documentadas abaixo.
    **v2 (C# — em migração):** Rotas `/api/v2/*` servidas pelo Web App ASP.NET Core 10.
    Autenticação via Firebase Auth (Bearer token) em ambas.

    Arquitetura: ADR-0012 (C# + Go microserviços gRPC).
  version: 1.1.0
  contact:
    name: Fernando Marques
servers:
  - url: https://garimpo-api-vj6afttbza-rj.a.run.app
    description: Produção — Go legado (Cloud Run)
  - url: https://garimpei-v2-879269475961.southamerica-east1.run.app
    description: Produção — C# v2 (Cloud Run multi-container)
  - url: https://garimpei.app.br
    description: Produção — via Cloudflare Worker (routing split)
  - url: http://localhost:8080
    description: Desenvolvimento local (Go)
  - url: http://localhost:8090
    description: Desenvolvimento local (C# v2)

security:
  - BearerAuth: []

tags:
  - name: Curadoria
    description: Busca, ranking, seleção de produtos e favoritos
  - name: Curadoria v2
    description: "Endpoints C# — curadoria com scoring, 4 fontes (busca, quedas, novos, favoritos)"
  - name: Lojas
    description: Monitoramento de lojas Shopee
  - name: Alertas
    description: Notificações automáticas de preço via Telegram
  - name: Publicação
    description: Publicar ofertas em canais (Telegram, WhatsApp)
  - name: Coleta
    description: Coleta periódica de snapshots de mercado
  - name: Destinos
    description: Canais de publicação (Telegram, WhatsApp)
  - name: Templates
    description: Modelos de mensagem para publicação
  - name: Análise
    description: Estatísticas e evolução de mercado
  - name: Onboarding
    description: Configuração de conta e credenciais (multi-tenant)
  - name: Admin
    description: Administração e logs

paths:
  /api/health:
    get:
      tags: [Admin]
      summary: Health check
      security: []
      responses:
        '200':
          description: API está ativa
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  fonte: { type: string, example: "shopee" }
                  categoria: { type: string }
                  keyword: { type: string }
                  store: { type: string, example: "bigquery" }

  /api/candidatos:
    get:
      tags: [Curadoria]
      summary: Lista candidatos ranqueados por teor
      security: []
      parameters:
        - name: estrategia
          in: query
          schema: { type: string, enum: [nicho, diversificada], default: nicho }
        - name: top
          in: query
          schema: { type: integer, default: 10 }
        - name: keyword
          in: query
          schema: { type: string }
        - name: categoria
          in: query
          schema: { type: string }
        - name: cat
          in: query
          description: ID de categoria Shopee
          schema: { type: integer }
        - name: comissao_min
          in: query
          schema: { type: number, example: 0.07 }
        - name: vendas_min
          in: query
          schema: { type: integer, example: 5 }
        - name: nota_min
          in: query
          schema: { type: number, example: 4.0 }
        - name: fonte
          in: query
          schema: { type: string, enum: [shopee, shopee-shop, csv] }
        - name: shop_ids
          in: query
          description: IDs de lojas separados por vírgula (fonte=shopee-shop)
          schema: { type: string, example: "123456,789012" }
        - name: sem_filtro
          in: query
          description: Se true, desliga filtros de elegibilidade
          schema: { type: boolean }
        - name: exploracao
          in: query
          description: Fração de exploração (0-0.9)
          schema: { type: number }
      responses:
        '200':
          description: Lista ranqueada
          content:
            application/json:
              schema:
                type: object
                properties:
                  estrategia: { type: string }
                  candidatos:
                    type: array
                    items: { $ref: '#/components/schemas/Candidato' }
                  total_bruto: { type: integer }

  /api/comparar:
    get:
      tags: [Curadoria]
      summary: Compara rankings nicho vs diversificada
      security: []
      parameters:
        - name: top
          in: query
          schema: { type: integer, default: 8 }
        - name: keyword
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Ambos os rankings
          content:
            application/json:
              schema:
                type: object
                properties:
                  nicho: { type: array, items: { $ref: '#/components/schemas/Candidato' } }
                  diversificada: { type: array, items: { $ref: '#/components/schemas/Candidato' } }

  /api/eventos:
    post:
      tags: [Curadoria]
      summary: Registra evento de curadoria (seleção)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Evento'
      responses:
        '202':
          description: Evento registrado

  /api/buscas:
    get:
      tags: [Curadoria]
      summary: Lista buscas salvas do usuário
      responses:
        '200':
          description: Lista de buscas
          content:
            application/json:
              schema:
                type: object
                properties:
                  buscas:
                    type: array
                    items: { $ref: '#/components/schemas/Busca' }
                  store: { type: string }
    post:
      tags: [Curadoria]
      summary: Salvar/atualizar busca
      parameters:
        - name: remover
          in: query
          description: Se presente, marca busca como inativa (tombstone)
          schema: { type: boolean }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Busca' }
      responses:
        '202':
          description: Busca salva
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  id: { type: string }
                  ativo: { type: boolean }

  /api/lojas:
    get:
      tags: [Lojas]
      summary: Lista lojas monitoradas do usuário
      responses:
        '200':
          description: Lista de lojas
          content:
            application/json:
              schema:
                type: object
                properties:
                  lojas:
                    type: array
                    items: { $ref: '#/components/schemas/Busca' }
    post:
      tags: [Lojas]
      summary: Adicionar loja ao monitoramento
      description: |
        Aceita URL da Shopee (shopee.com.br/shop/{id}) ou ID numérico (5-15 dígitos).
        Cria uma busca com shop_ids e registra job no scheduler (cron padrão: a cada 4h).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [input]
              properties:
                input:
                  type: string
                  description: URL da loja ou ID numérico
                  examples:
                    - "https://shopee.com.br/shop/123456"
                    - "123456"
                cron:
                  type: string
                  description: Expressão cron (padrão "0 */4 * * *")
                  example: "0 */4 * * *"
                origem_padrao:
                  type: string
                  description: País de origem dos produtos da loja (ex. Coreia, Japão). Herdado por todos os produtos.
                  example: "Coreia"
      responses:
        '201':
          description: Loja adicionada
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  id: { type: string, example: "loja-123456" }
                  shop_id: { type: integer, example: 123456 }
                  nome: { type: string, example: "SKIN1004 Official" }
        '400':
          description: Input inválido
        '409':
          description: Loja já está sendo monitorada
    delete:
      tags: [Lojas]
      summary: Remover monitoramento de loja
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
          example: "loja-123456"
      responses:
        '200':
          description: Loja removida (tombstone)
        '404':
          description: Loja não encontrada

  /api/lojas/novidades:
    get:
      tags: [Lojas]
      summary: Novidades e variações de preço de uma loja
      parameters:
        - name: busca_id
          in: query
          schema: { type: string }
        - name: dias
          in: query
          schema: { type: integer, default: 7 }
      responses:
        '200':
          description: Novidades da loja
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NovidadesLojas' }

  /api/lojas/evolucao:
    get:
      tags: [Análise]
      summary: Evolução de preço das lojas monitoradas
      description: Série temporal de preço médio por dia, com resumo global e top variações.
      parameters:
        - name: dias
          in: query
          schema: { type: integer, default: 30 }
      responses:
        '200':
          description: Dados de evolução
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EvolucaoLojas' }

  /api/favoritos:
    get:
      tags: [Curadoria]
      summary: Lista produtos favoritados pelo usuário
      responses:
        '200':
          description: Lista de favoritos
          content:
            application/json:
              schema:
                type: object
                properties:
                  favoritos:
                    type: array
                    items: { $ref: '#/components/schemas/Favorito' }
    post:
      tags: [Curadoria]
      summary: Salvar produto como favorito
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Favorito' }
      responses:
        '201':
          description: Favorito salvo
    delete:
      tags: [Curadoria]
      summary: Remover produto dos favoritos
      parameters:
        - name: produto_id
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Favorito removido

  /api/alertas:
    get:
      tags: [Alertas]
      summary: Configuração atual dos alertas de preço
      responses:
        '200':
          description: Estado dos alertas
          content:
            application/json:
              schema:
                type: object
                properties:
                  ativo: { type: boolean }
                  chat_id: { type: string, description: "Mascarado" }
                  threshold: { type: number, example: 0.15 }
                  apenas_quedas: { type: boolean }
                  telegram_token: { type: boolean, description: "Se token está configurado" }

  /api/alertas/testar:
    post:
      tags: [Alertas]
      summary: Enviar alerta de teste ou verificar alertas de uma loja
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                busca_id:
                  type: string
                  description: Se informado, verifica alertas reais dessa loja
      responses:
        '200':
          description: Teste enviado
        '400':
          description: Alertas não configurados

  /api/alertas/configurar:
    post:
      tags: [Alertas]
      summary: Atualizar configuração de alertas em runtime
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                chat_id: { type: string, example: "-1001234567890" }
                threshold: { type: number, example: 0.15 }
                apenas_quedas: { type: boolean }
      responses:
        '200':
          description: Configuração atualizada

  /api/coletar:
    post:
      tags: [Coleta]
      summary: Executar coleta e gravar snapshot
      description: |
        Dispara busca de produtos, aplica ranking, grava snapshot no BigQuery.
        Protegido por X-Garimpo-Token. Quando busca_id é informado e a fonte é shopee-shop,
        aplica amostragem rotativa (cursor de paginação) e throttling.
      security:
        - ColetaToken: []
      parameters:
        - name: fonte
          in: query
          schema: { type: string, enum: [shopee, shopee-shop, csv] }
        - name: keyword
          in: query
          schema: { type: string }
        - name: categoria
          in: query
          schema: { type: string }
        - name: estrategia
          in: query
          schema: { type: string, default: nicho }
        - name: top
          in: query
          schema: { type: integer, default: 20 }
        - name: shop_ids
          in: query
          schema: { type: string }
        - name: busca_id
          in: query
          description: Habilita rotação de catálogo e alertas automáticos
          schema: { type: string }
      responses:
        '202':
          description: Coleta executada
          content:
            application/json:
              schema:
                type: object
                properties:
                  categoria: { type: string }
                  estrategia: { type: string }
                  coletados: { type: integer }
                  em: { type: string, format: date-time }
        '401':
          description: Token inválido

  /api/publicar:
    post:
      tags: [Publicação]
      summary: Publicar oferta em canal (envio imediato)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PublicarRequest' }
      responses:
        '200':
          description: Publicação enviada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Resultado' }

  /api/publicacoes:
    get:
      tags: [Publicação]
      summary: Lista publicações (agendadas, enviadas, erros)
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [agendada, enviada, erro, ""] }
      responses:
        '200':
          description: Lista de publicações
    post:
      tags: [Publicação]
      summary: Agendar ou enviar publicação
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PublicarRequest' }
      responses:
        '201':
          description: Publicação criada

  /api/publicar-pendentes:
    post:
      tags: [Publicação]
      summary: Enviar publicações agendadas cujo horário já passou
      security:
        - ColetaToken: []
      responses:
        '200':
          description: Resultado do processamento
          content:
            application/json:
              schema:
                type: object
                properties:
                  enviadas: { type: integer }
                  erros: { type: integer }

  /api/destinos:
    get:
      tags: [Destinos]
      summary: Lista destinos de publicação
      responses:
        '200':
          description: Lista de destinos
          content:
            application/json:
              schema:
                type: object
                properties:
                  destinos:
                    type: array
                    items: { $ref: '#/components/schemas/Destino' }
    post:
      tags: [Destinos]
      summary: Criar/atualizar destino
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Destino' }
      responses:
        '201':
          description: Destino salvo
    delete:
      tags: [Destinos]
      summary: Remover destino
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Destino removido

  /api/templates:
    get:
      tags: [Templates]
      summary: Lista templates de mensagem
      responses:
        '200':
          description: Lista de templates
    post:
      tags: [Templates]
      summary: Criar/atualizar template
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Template' }
      responses:
        '201':
          description: Template salvo
    delete:
      tags: [Templates]
      summary: Remover template
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Template removido

  /api/templates/preview:
    post:
      tags: [Templates]
      summary: Renderizar preview de template com dados
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                template_id: { type: string }
                nome: { type: string }
                preco: { type: number }
                categoria: { type: string }
      responses:
        '200':
          description: Preview renderizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  preview: { type: string }
                  com_foto: { type: boolean }

  /api/estatisticas:
    get:
      tags: [Análise]
      summary: Estatísticas de mercado por categoria
      parameters:
        - name: dias
          in: query
          schema: { type: integer, default: 30 }
      responses:
        '200':
          description: Resumo por categoria
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Estatisticas' }

  /api/coletas:
    get:
      tags: [Análise]
      summary: Histórico de coletas executadas
      parameters:
        - name: dias
          in: query
          schema: { type: integer, default: 30 }
      responses:
        '200':
          description: Lista de coletas

  /api/conversoes:
    get:
      tags: [Análise]
      summary: Relatório de conversões por canal/sub_id
      parameters:
        - name: dias
          in: query
          schema: { type: integer, default: 30 }
      responses:
        '200':
          description: Conversões agrupadas

  /api/conversoes/reais:
    get:
      tags: [Análise]
      summary: Conversões reais da Shopee (conversionReport)
      description: |
        Consulta o relatório de conversões real da API de afiliados da Shopee.
        Retorna vendas que aconteceram via links de afiliado, com produto, loja,
        comissão, status e canal (sub_id).
      parameters:
        - name: dias
          in: query
          schema: { type: integer, default: 30, maximum: 90 }
      responses:
        '200':
          description: Conversões reais com resumo
          content:
            application/json:
              schema:
                type: object
                properties:
                  dias: { type: integer }
                  total: { type: integer }
                  pendentes: { type: integer }
                  confirmadas: { type: integer }
                  comissao_total: { type: number }
                  conversoes:
                    type: array
                    items:
                      type: object
                      properties:
                        conversion_id: { type: string }
                        utm_content: { type: string }
                        total_commission: { type: number }
                        status: { type: string, enum: [PENDING, UNPAID, COMPLETED, PAID, CANCELLED] }
                        purchase_time: { type: string }
                        product_name: { type: string }
                        product_id: { type: string }
                        shop_name: { type: string }

  /api/conversoes/sync:
    post:
      tags: [Coleta]
      summary: Sincroniza conversões reais da Shopee (conversionReport)
      description: |
        Consulta o conversionReport da API de afiliados da Shopee e retorna
        conversões dos últimos N dias. Chamado pelo Cloud Scheduler 1x/dia.
      security:
        - ColetaToken: []
      parameters:
        - name: dias
          in: query
          schema: { type: integer, default: 7 }
      responses:
        '200':
          description: Conversões sincronizadas
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  conversoes: { type: integer }
                  dias: { type: integer }

  /api/resolver-link:
    post:
      tags: [Curadoria]
      summary: Resolver link curto da Shopee para dados do produto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url: { type: string }
      responses:
        '200':
          description: Dados do produto extraídos

  /api/produto/origem:
    get:
      tags: [Curadoria]
      summary: Buscar origem e marca de um produto via API pública Shopee
      description: |
        Consulta a API pública v4 da Shopee (pdp/get_pc) para extrair os atributos
        "País de Origem" e "Marca" do produto. Resultado cacheado por 24h.
        Não requer autenticação. Usado pelo CandidateCard para enriquecer o badge.
      security: []
      parameters:
        - name: item_id
          in: query
          required: true
          schema: { type: string }
          example: "23720954312"
        - name: shop_id
          in: query
          required: true
          schema: { type: string }
          example: "785541033"
      responses:
        '200':
          description: Origem e marca do produto
          content:
            application/json:
              schema:
                type: object
                properties:
                  item_id: { type: string }
                  shop_id: { type: string }
                  origem: { type: string, description: "País normalizado (ex: Coreia, Japão, China)" }
                  marca: { type: string }
                  fonte: { type: string, enum: [api_publica, cache, erro] }

  /api/produto/origem/batch:
    post:
      tags: [Curadoria]
      summary: Buscar origem de múltiplos produtos (máx 20)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                itens:
                  type: array
                  items:
                    type: object
                    properties:
                      item_id: { type: string }
                      shop_id: { type: string }
      responses:
        '200':
          description: Resultados por produto
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultados:
                    type: array
                    items:
                      type: object
                      properties:
                        item_id: { type: string }
                        shop_id: { type: string }
                        origem: { type: string }
                        marca: { type: string }
                        fonte: { type: string }

  /api/whatsapp/grupos:
    get:
      tags: [Destinos]
      summary: Lista grupos WhatsApp disponíveis
      description: |
        DEPRECATED: Este endpoint usava a API Maytapi. Após ADR-0013, o WhatsApp
        usa a Meta Cloud API. Grupos são gerenciados via /api/destinos.
      deprecated: true
      responses:
        '200':
          description: Lista de grupos

  /api/admin/logs:
    get:
      tags: [Admin]
      summary: Logs recentes do servidor
      parameters:
        - name: n
          in: query
          schema: { type: integer, default: 100 }
        - name: nivel
          in: query
          schema: { type: string, enum: [error, warn, info, debug, ""] }
      responses:
        '200':
          description: Logs e estatísticas

  /api/admin/log-level:
    post:
      tags: [Admin]
      summary: Alterar nível de log em runtime
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nivel: { type: string, enum: [debug, info, warn, error] }
      responses:
        '200':
          description: Nível alterado

  /api/admin/me:
    get:
      tags: [Admin]
      summary: Verifica se o usuário logado é admin
      responses:
        '200':
          description: Status de admin
          content:
            application/json:
              schema:
                type: object
                properties:
                  admin: { type: boolean }
                  email: { type: string }

  /api/admin/shopee-introspect:
    get:
      tags: [Admin]
      summary: Introspecção do schema GraphQL da API Shopee
      description: |
        Faz 4 queries de introspecção na API de afiliados para descobrir campos
        disponíveis (especialmente relacionados a origem do produto). Restrito a admin.
      responses:
        '200':
          description: Resultados da introspecção
          content:
            application/json:
              schema:
                type: object
                properties:
                  app_id: { type: string }
                  endpoint: { type: string }
                  resultados:
                    type: array
                    items:
                      type: object
                      properties:
                        nome: { type: string }
                        sucesso: { type: boolean }
                        erro: { type: string }
                        resposta: { type: object }
                        campos_origem: { type: array, items: { type: string } }
                  campos_origem_global: { type: array, items: { type: string } }
                  conclusao: { type: string }
        '403':
          description: Não é admin

  /api/onboarding/status:
    get:
      tags: [Onboarding]
      summary: Status do onboarding do tenant
      description: Retorna progresso do onboarding e se as credenciais estão configuradas.
      responses:
        '200':
          description: Status atual
          content:
            application/json:
              schema:
                type: object
                properties:
                  step: { type: integer, description: "0=início, 1=termos, 2=shopee, 3=telegram, 4=completo" }
                  configurado: { type: boolean }
                  aceitou_termos: { type: boolean }
                  shopee_app_id: { type: string }
                  shopee_secret: { type: string, description: "Mascarado (***configurado***)" }
                  telegram_token: { type: string, description: "Mascarado" }
                  telegram_chat_id: { type: string }

  /api/onboarding/termos:
    post:
      tags: [Onboarding]
      summary: "Step 1: Aceitar termos de uso (LGPD)"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [aceito]
              properties:
                aceito: { type: boolean, description: "Deve ser true" }
      responses:
        '200':
          description: Termos aceitos
          content:
            application/json:
              schema:
                type: object
                properties:
                  step: { type: integer }
                  status: { type: string }

  /api/onboarding/shopee:
    post:
      tags: [Onboarding]
      summary: "Step 2: Salvar credenciais Shopee Affiliate API"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [app_id, secret]
              properties:
                app_id: { type: string, example: "18332030606" }
                secret: { type: string, description: "Será criptografado antes de armazenar" }
      responses:
        '200':
          description: Credenciais salvas
        '403':
          description: Termos não aceitos

  /api/onboarding/telegram:
    post:
      tags: [Onboarding]
      summary: "Step 3: Configurar bot Telegram (opcional)"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string, description: "Token do BotFather" }
                chat_id: { type: string, description: "Chat ID do grupo" }
                pular: { type: boolean, description: "Se true, pula este step" }
      responses:
        '200':
          description: Telegram configurado ou pulado

  /api/onboarding/validar:
    post:
      tags: [Onboarding]
      summary: "Step 4: Validar credenciais com chamada de teste à API Shopee"
      description: Faz uma requisição real à API de afiliados para confirmar que AppID e Secret funcionam.
      responses:
        '200':
          description: Credenciais validadas — onboarding completo
        '400':
          description: Credenciais inválidas (com detalhe do erro)

  /api/onboarding/excluir-conta:
    post:
      tags: [Onboarding]
      summary: Excluir conta e todos os dados (LGPD)
      description: Ação irreversível. Remove config do tenant e dados associados.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmar]
              properties:
                confirmar: { type: boolean, description: "Deve ser true" }
      responses:
        '200':
          description: Conta e dados excluídos
        '400':
          description: Confirmação não enviada

  # ═══════════════════════════════════════════════════════════════════════════
  # API v2 (C# ASP.NET Core 10) — servida pelo garimpei-v2 Cloud Run
  # Spec completa auto-gerada em: /openapi/v1.json (no serviço C#)
  # ═══════════════════════════════════════════════════════════════════════════

  /api/v2/curadoria/ranking:
    get:
      tags: [Curadoria v2]
      summary: Ranking de produtos por scoring (fetch via gRPC collector)
      description: |
        Busca produtos na Shopee via microserviço collector (gRPC), aplica filtros
        de elegibilidade e scoring (comissão 45%, EV 35%, avaliação 20%).
        Fonte: "Busca" na página publicar.
      parameters:
        - name: keyword
          in: query
          required: true
          schema: { type: string }
          example: "sérum vitamina c"
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: comissao_min
          in: query
          schema: { type: number, default: 0.07 }
        - name: vendas_min
          in: query
          schema: { type: integer, default: 0 }
        - name: nota_min
          in: query
          schema: { type: number, default: 0 }
      responses:
        '200':
          description: Produtos rankeados com score e componentes
          content:
            application/json:
              schema:
                type: object
                properties:
                  fonte: { type: string, example: "collector-grpc" }
                  total_bruto: { type: integer }
                  candidatos:
                    type: array
                    items: { $ref: '#/components/schemas/ScoredProduct' }
        '400':
          description: keyword ausente
        '401':
          description: JWT ausente ou inválido

  /api/v2/curadoria/ranking/shop:
    get:
      tags: [Curadoria v2]
      summary: Ranking de produtos de uma loja específica
      description: |
        Fetch via collector gRPC (FetchShop) + scoring. Útil para monitoramento
        de lojas específicas.
      parameters:
        - name: shop_id
          in: query
          required: true
          schema: { type: integer }
          example: 785541033
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: comissao_min
          in: query
          schema: { type: number, default: 0.07 }
        - name: vendas_min
          in: query
          schema: { type: integer, default: 0 }
        - name: nota_min
          in: query
          schema: { type: number, default: 0 }
      responses:
        '200':
          description: Produtos da loja rankeados
          content:
            application/json:
              schema:
                type: object
                properties:
                  fonte: { type: string, example: "collector-grpc-shop" }
                  total_bruto: { type: integer }
                  candidatos:
                    type: array
                    items: { $ref: '#/components/schemas/ScoredProduct' }
        '400':
          description: shop_id ausente
        '401':
          description: JWT ausente ou inválido

  /api/v2/curadoria/quedas:
    get:
      tags: [Curadoria v2]
      summary: Produtos com queda de preço
      description: |
        Fonte: "Quedas" na página publicar. Retorna produtos que tiveram variação
        negativa de preço detectada entre snapshots. Stub durante migração (dados
        ainda em BigQuery via Go legado).
      responses:
        '200':
          description: Produtos com queda de preço
        '401':
          description: JWT ausente ou inválido

  /api/v2/curadoria/novos:
    get:
      tags: [Curadoria v2]
      summary: Produtos recém-detectados
      description: |
        Fonte: "Novos" na página publicar. Retorna produtos que apareceram pela
        primeira vez nos snapshots recentes. Stub durante migração.
      responses:
        '200':
          description: Produtos novos detectados
        '401':
          description: JWT ausente ou inválido

  /api/v2/curadoria/favoritos:
    get:
      tags: [Curadoria v2]
      summary: Produtos favoritos do usuário
      description: |
        Fonte: "Favoritos" na página publicar. Retorna produtos salvos pelo
        usuário no PostgreSQL, filtrados pelo tenant (owner_uid do JWT).
      responses:
        '200':
          description: Lista de produtos favoritos
          content:
            application/json:
              schema:
                type: object
                properties:
                  fonte: { type: string, example: "favoritos" }
                  candidatos:
                    type: array
                    items: { $ref: '#/components/schemas/ProductEntity' }
        '401':
          description: JWT ausente ou inválido

  /api/v2/health:
    get:
      tags: [Admin]
      summary: Health check do C# Web App
      security: []
      responses:
        '200':
          description: Healthy (inclui conectividade com PostgreSQL)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID Token
    ColetaToken:
      type: apiKey
      in: header
      name: X-Garimpo-Token

  schemas:
    Candidato:
      type: object
      properties:
        id: { type: string }
        nome: { type: string }
        categoria: { type: string }
        loja: { type: string, description: "Nome da loja vendedora" }
        origem: { type: string, description: "País de origem (ex: Coreia, Japão). Vazio se desconhecido." }
        preco: { type: number }
        comissao: { type: number, description: "Fração (0.15 = 15%)" }
        vendas: { type: integer }
        avaliacao: { type: number }
        score: { type: number, description: "Teor (0-1)" }
        link: { type: string, format: uri }
        imagem: { type: string, format: uri }
        suspeito: { type: boolean }
        exploracao: { type: boolean }

    Busca:
      type: object
      properties:
        id: { type: string }
        nome: { type: string, description: "Nome amigável da loja ou perfil" }
        keywords: { type: array, items: { type: string } }
        shop_ids: { type: array, items: { type: integer } }
        categorias: { type: array, items: { type: string }, description: "Categorias Shopee (filtro OR)" }
        fontes: { type: array, items: { type: string, enum: [curadoria, quedas, novos, favoritos] }, description: "Fontes de dados que esta busca monitora" }
        categoria: { type: string, description: "Legado — use categorias[]" }
        estrategia: { type: string, default: nicho }
        comissao_min: { type: number }
        vendas_min: { type: integer }
        nota_min: { type: number }
        top: { type: integer }
        dias_janela: { type: integer, default: 7, description: "Janela para considerar produto 'novo' (dias)" }
        cron: { type: string, example: "0 8 * * *", description: "Vazio = sem agendamento (atalho manual)" }
        ativo: { type: boolean }
        origem_padrao: { type: string, description: "País de origem padrão (ex: Coreia). Herdado pelos produtos." }
        rotation_cursor: { type: object, description: "JSON map shopID→próxima página" }
        full_scan_at: { type: object, description: "JSON map shopID→timestamp" }

    Evento:
      type: object
      properties:
        tipo: { type: string, enum: [selecao, publicacao] }
        id: { type: string }
        nome: { type: string }
        categoria: { type: string }
        estrategia: { type: string }
        comissao: { type: number }
        preco: { type: number }
        vendas: { type: integer }
        score: { type: number }

    NovidadesLojas:
      type: object
      properties:
        busca_id: { type: string }
        dias_janela: { type: integer }
        produtos_novos:
          type: array
          items:
            type: object
            properties:
              produto_id: { type: string }
              nome: { type: string }
              preco: { type: number }
              comissao: { type: number }
              vendas: { type: integer }
              nota: { type: number }
              imagem: { type: string, format: uri }
              link: { type: string, format: uri }
              loja: { type: string }
              detectado_em: { type: string }
        variacoes:
          type: array
          items: { $ref: '#/components/schemas/VariacaoPreco' }
        total_atual: { type: integer }

    VariacaoPreco:
      type: object
      properties:
        produto_id: { type: string }
        nome: { type: string }
        preco_anterior: { type: number }
        preco_atual: { type: number }
        variacao_pct: { type: number, description: "Ex: -0.20 = baixou 20%" }
        imagem: { type: string, format: uri }
        link: { type: string, format: uri }
        loja: { type: string }
        detectado_em: { type: string }

    EvolucaoLojas:
      type: object
      properties:
        dias_janela: { type: integer }
        lojas:
          type: array
          items:
            type: object
            properties:
              busca_id: { type: string }
              total_produtos: { type: integer }
              preco_medio_atual: { type: number }
              preco_medio_inicio: { type: number }
              variacao_media_pct: { type: number }
              coletas: { type: integer }
              pontos:
                type: array
                items:
                  type: object
                  properties:
                    data: { type: string, format: date }
                    preco_medio: { type: number }
                    produtos: { type: integer }
              top_quedas: { type: array, items: { $ref: '#/components/schemas/VariacaoPreco' } }
              top_altas: { type: array, items: { $ref: '#/components/schemas/VariacaoPreco' } }
        resumo:
          type: object
          properties:
            total_lojas: { type: integer }
            total_produtos: { type: integer }
            preco_medio_global: { type: number }
            variacao_media_global_pct: { type: number }
            total_quedas: { type: integer }
            total_altas: { type: integer }

    Estatisticas:
      type: object
      properties:
        fonte: { type: string }
        dias_janela: { type: integer }
        total_amostras: { type: integer }
        por_categoria:
          type: array
          items:
            type: object
            properties:
              categoria: { type: string }
              amostras: { type: integer }
              comissao_media: { type: number }
              comissao_mediana: { type: number }
              preco_medio: { type: number }
              vendas_media: { type: number }
              teor_medio: { type: number }

    PublicarRequest:
      type: object
      properties:
        id: { type: string }
        nome: { type: string }
        categoria: { type: string }
        preco: { type: number }
        comissao: { type: number }
        link: { type: string }
        imagem: { type: string }
        estrategia: { type: string }
        destino_id: { type: string }
        template_id: { type: string }
        legenda_custom: { type: string }
        agendada_em: { type: string, format: date-time, description: "Se informado, agenda para este horário" }

    Resultado:
      type: object
      properties:
        canal: { type: string }
        enviado: { type: boolean }
        mensagem: { type: string }
        detalhe: { type: string }
        sub_id: { type: string }

    Destino:
      type: object
      properties:
        id: { type: string }
        nome: { type: string }
        tipo: { type: string, enum: [telegram, whatsapp] }
        config: { type: string, description: "chat_id (Telegram) ou group_id (WhatsApp)" }
        ativo: { type: boolean }

    Template:
      type: object
      properties:
        id: { type: string }
        nome: { type: string }
        corpo: { type: string, description: "HTML com placeholders {{nome}}, {{preco}}, etc." }
        com_foto: { type: boolean }

    Favorito:
      type: object
      properties:
        produto_id: { type: string }
        nome: { type: string }
        preco: { type: number }
        comissao: { type: number }
        link: { type: string, format: uri }
        imagem: { type: string, format: uri }
        loja: { type: string }
        categoria: { type: string }
        origem: { type: string }
        salvo_em: { type: string, format: date-time }

    # ── Schemas v2 (C#) ──────────────────────────────────────────────────

    ScoredProduct:
      type: object
      description: Produto pontuado pelo scoring engine (C#)
      properties:
        id: { type: string }
        name: { type: string }
        category: { type: string }
        shopName: { type: string }
        shopId: { type: string }
        origin: { type: string }
        price: { type: number }
        originalPrice: { type: number }
        discountPercent: { type: number }
        commission: { type: number }
        sales: { type: integer }
        rating: { type: number }
        link: { type: string, format: uri }
        productLink: { type: string, format: uri }
        imageUrl: { type: string, format: uri }
        score: { type: number, description: "0-1, composto dos componentes" }
        components:
          type: object
          properties:
            commission: { type: number, description: "0.45 * normalized" }
            expectedValue: { type: number, description: "0.35 * normalized" }
            rating: { type: number, description: "0.20 * normalized" }
        suspicious: { type: boolean, description: "Comissão alta + zero tração" }
        offerExpiresAt: { type: string, format: date-time }

    ProductEntity:
      type: object
      description: Produto armazenado no PostgreSQL (entidade EF Core)
      properties:
        id: { type: string, format: uuid }
        itemId: { type: integer }
        shopId: { type: integer }
        name: { type: string }
        price: { type: number }
        originalPrice: { type: number }
        sold: { type: integer }
        rating: { type: number }
        imageUrl: { type: string, format: uri }
        productUrl: { type: string, format: uri }
        shopName: { type: string }
        discountPercent: { type: number }
        ownerUid: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
