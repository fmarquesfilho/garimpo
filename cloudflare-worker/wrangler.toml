name = "garimpei-proxy"
main = "worker.js"
compatibility_date = "2026-06-25"

routes = [
  { pattern = "garimpei.app.br/*", zone_name = "garimpei.app.br" }
]

# Feature flags — controla routing v1/v2
# Override via `wrangler secret put` ou Cloudflare dashboard (Settings > Variables)
[vars]
V2_ENABLED = "true"
V1_ORIGIN = "https://garimpo-api-vj6afttbza-rj.a.run.app"
PAGES_URL = "https://garimpei-web.pages.dev"
DOCS_URL = "https://garimpei-docs.pages.dev"
CACHE_MAX_AGE = "300"
# V2_ORIGIN set via `wrangler secret put V2_ORIGIN`
# CF_PURGE_TOKEN — set via: wrangler secret put CF_PURGE_TOKEN (used by Collector, not Worker)
