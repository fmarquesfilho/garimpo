name = "garimpei-proxy"
main = "worker.js"
compatibility_date = "2026-06-25"

routes = [
  { pattern = "garimpei.app.br/*", zone_name = "garimpei.app.br" }
]

# Feature flags — controla routing v1/v2
# Override via `wrangler secret put` ou Cloudflare dashboard (Settings > Variables)
[vars]
V2_ENABLED = "false"
V1_ORIGIN = "https://garimpo-api-vj6afttbza-rj.a.run.app"
# V2_ORIGIN = "https://garimpei-v2-xxxxxxx-rj.a.run.app"  # set after first deploy
