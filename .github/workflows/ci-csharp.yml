name: CI — C# Web App

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'protos/**'
  pull_request:
    paths:
      - 'src/**'
      - 'protos/**'

jobs:
  build-and-test:
    name: Build & Test (.NET 10)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: garimpei
          POSTGRES_PASSWORD: garimpei_dev
          POSTGRES_DB: garimpei
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U garimpei"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal
        env:
          ConnectionStrings__PostgreSQL: "Host=localhost;Port=5432;Database=garimpei;Username=garimpei;Password=garimpei_dev"

  proto-lint:
    name: Proto lint & sync check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-setup-action@v1

      - name: Lint
        run: buf lint
        working-directory: protos

      - name: Regenerar stubs Go e verificar sync
        run: |
          cd protos && buf generate
          cd ..
          if ! git diff --exit-code gen/go/; then
            echo "❌ gen/go/ desatualizado — rode 'cd protos && buf generate' e commite"
            exit 1
          fi

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Regenerar stubs C# e verificar sync
        run: |
          cd protos && buf generate
          cd ..
          if ! git diff --exit-code src/Garimpei.Protos/Generated/; then
            echo "❌ src/Garimpei.Protos/Generated/ desatualizado — rode 'cd protos && buf generate' e commite"
            exit 1
          fi

  docker:
    name: Docker build (C# API)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t garimpei-api-v2:ci -f src/Garimpei.Api/Dockerfile src/
