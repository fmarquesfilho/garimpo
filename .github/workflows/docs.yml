name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'docs-site/**'
      - 'backlog/**'          # tarefas → BOARD/ROADMAP/tarefas
      - 'cmd/gen-board/**'     # gerador do board/roadmap
      - 'cmd/gen-er/**'        # gerador do ER (ENTIDADES)
      - 'internal/store/**'    # schema → ENTIDADES
      - 'deploy/**'            # env → env-vars
      - '.mise/tasks/docs/**'
      - '.mise/tasks/gen/**'
      - '.github/workflows/docs.yml'

jobs:
  deploy:
    name: Build & deploy docs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # mise fornece Go (geradores gen-board/gen-er) e Node via mise.toml.
      - uses: jdx/mise-action@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Regenerate & build docs-site
        run: |
          # docs/gerado/* e docs-site/docs/ NÃO são commitados (ver .gitignore).
          # `mise run docs` regenera tudo (ER + env + board + sync) antes do build.
          mise run docs
          cd docs-site && npm ci && npm run build

      - name: Validate build output
        run: |
          # Ensure Mermaid and sidebar scripts are injected
          if ! grep -q "mermaid" docs-site/doc_build/fluxos-sequencia.html; then
            echo "❌ Mermaid script not found in build output"
            exit 1
          fi
          echo "✅ Build output validated"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: "641900c067ae51982debe5c2a98ff39b"
          command: pages deploy docs-site/doc_build --project-name garimpei-docs
