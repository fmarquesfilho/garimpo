name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'docs-site/**'
      - 'backlog/**'
      - 'docs-site/docs/api.md'
      - '.mise/tasks/docs/**'
      - '.github/workflows/docs.yml'

jobs:
  deploy:
    name: Build & deploy docs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install & build docs-site
        run: |
          .mise/tasks/docs/sync
          cd docs-site && npm ci && npm run build

      - name: Validate build output
        run: |
          # Ensure Mermaid and sidebar scripts are injected
          if ! grep -q "mermaid" docs-site/doc_build/fluxos-sequencia.html; then
            echo "❌ Mermaid script not found in build output"
            exit 1
          fi
          echo "✅ Build output validated"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: "641900c067ae51982debe5c2a98ff39b"
          command: pages deploy docs-site/doc_build --project-name garimpei-docs
