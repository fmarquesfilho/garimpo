name: Deploy → GCP

on:
  push:
    branches: [main]

# Variáveis de repositório (Settings → Secrets and variables → Variables):
#   GCP_REGION  = southamerica-east1   (ou a região do seu projeto)
# Secrets de repositório (Settings → Secrets and variables → Secrets):
#   GCP_PROJECT_ID = id-do-projeto-gcp
#   GCP_SA_KEY     = conteúdo do key.json da service account de deploy
# (ver docs/DEPLOY_GCP.md para criar a service account e os papéis necessários)

env:
  GCP_REGION: ${{ vars.GCP_REGION || 'southamerica-east1' }}

jobs:
  # ── 1. Testes Go ─────────────────────────────────────────────────────────
  test-go:
    name: Testes Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go mod tidy (garante go.sum atualizado)
        run: go mod tidy

      - name: Verificar diff após go mod tidy
        run: |
          if ! git diff --quiet go.sum; then
            echo "go.sum desatualizado — rode 'go mod tidy' localmente e commite o resultado."
            git diff go.sum
            exit 1
          fi

      - name: Testes (build tag padrão, sem BigQuery)
        run: go test ./...

  # ── 2. Testes do frontend ────────────────────────────────────────────────
  test-web:
    name: Testes frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: npm ci
        run: npm ci

      - name: npm run build
        run: npm run build

      - name: Testes unitários (Vitest — componentes Svelte)
        run: npx vitest run

      - name: Instalar Playwright
        run: npx playwright install chromium --with-deps

      - name: Testes E2E (Playwright)
        run: npm test

  # ── 3. Build e deploy (API + frontend) no Cloud Run ──────────────────────
  deploy:
    name: Deploy → Cloud Run
    needs: [test-go, test-web]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configurar Docker para o Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build e push da imagem (Go + frontend)
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/garimpo/garimpo-api"
          docker build --tag "$IMAGE:${{ github.sha }}" --tag "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy no Cloud Run
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/garimpo/garimpo-api"
          gcloud run deploy garimpo-api \
            --image "$IMAGE:${{ github.sha }}" \
            --region "${{ env.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }},BQ_DATASET=garimpo,BQ_TABELA=eventos,BQ_TABELA_SNAP=snapshots,GCP_REGION=${{ env.GCP_REGION }},ADMIN_EMAILS=${{ vars.ADMIN_EMAILS }}" \
            --update-secrets "SHOPEE_APP_ID=SHOPEE_APP_ID:latest,SHOPEE_SECRET=SHOPEE_SECRET:latest,COLETA_TOKEN=COLETA_TOKEN:latest,TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,WHATSAPP_API_KEY=WHATSAPP_API_KEY:latest,WHATSAPP_PRODUCT_ID=WHATSAPP_PRODUCT_ID:latest,WHATSAPP_PHONE_ID=WHATSAPP_PHONE_ID:latest" \
            --args="-fonte,shopee" \
            --quiet
          # Atualiza a URL do scheduler
          SVC_URL=$(gcloud run services describe garimpo-api --region "${{ env.GCP_REGION }}" --format='value(status.url)')
          gcloud run services update garimpo-api \
            --region "${{ env.GCP_REGION }}" \
            --update-env-vars "SCHEDULER_API_URL=$SVC_URL" \
            --quiet

  # ── 4. Atualizar jobs do Cloud Scheduler ─────────────────────────────────
  update-scheduler:
    name: Atualizar Cloud Scheduler
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Instalar jq
        run: sudo apt-get install -y jq

      - name: Recriar jobs do scheduler a partir das buscas salvas
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ env.GCP_REGION }}
        run: |
          # Acorda o Cloud Run (cold start) antes de rodar o script
          URL=$(gcloud run services describe garimpo-api --region "$REGION" --format='value(status.url)')
          echo "Acordando $URL..."
          curl -sS --retry 5 --retry-delay 10 --retry-all-errors "$URL/api/health" || true
          sleep 5
          chmod +x deploy/scheduler-exemplo.sh
          deploy/scheduler-exemplo.sh
