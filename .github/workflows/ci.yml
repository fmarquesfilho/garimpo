name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'docs-site/**'
      - 'backlog/**'
      - 'README.md'
      - 'src/README.md'
      - 'web/README.md'
      - '*.md'
  pull_request:

jobs:
  # ── Go (build + test + lint + arch) ──────────────────────────────────────
  go:
    name: Go
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - run: mise run build:go
      - run: mise run test:go
      - run: mise run lint:go
      - run: mise run check:file-size -- 400
      - run: mise run docs:check

  # ── C# (build + test) ───────────────────────────────────────────────────
  csharp:
    name: C#
    runs-on: ubuntu-latest
    timeout-minutes: 8
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: garimpei
          POSTGRES_PASSWORD: garimpei_dev
          POSTGRES_DB: garimpei
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U garimpei"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore src/Garimpei.sln
      - run: dotnet build --no-restore --configuration Release src/Garimpei.sln
      - run: dotnet test --no-build --configuration Release src/Garimpei.sln
        env:
          ConnectionStrings__PostgreSQL: "Host=localhost;Port=5432;Database=garimpei;Username=garimpei;Password=garimpei_dev"

  # ── Python (lint + syntax) ──────────────────────────────────────────────
  python:
    name: Python
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - run: mise run lint:python
      - name: Syntax check
        run: |
          pip install -r services/analyzer/requirements.txt --quiet
          python -c "import sys; sys.path.insert(0, 'services/analyzer'); import main"

  # ── Proto (lint + sync + breaking) ──────────────────────────────────────
  proto:
    name: Proto
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@v1
      - name: Lint
        run: cd protos && buf lint
      - name: Sync check (Go + C#)
        run: |
          cd protos && buf generate && cd ..
          if ! git diff --exit-code gen/go/ src/Garimpei.Protos/Generated/; then
            echo "❌ Stubs desatualizados. Rode: mise run proto:generate"
            exit 1
          fi
      - name: Breaking changes
        run: cd protos && buf breaking --against '../.git#branch=main'
        continue-on-error: true

  # ── Frontend (build + test + e2e) ───────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - run: npm ci
      - run: npx svelte-kit sync
      - run: npm run check
      - run: npm run build
      - run: npm run lint:css
      - run: npm run lint:js
      - run: mise run check:ui-coverage -- --strict
      - run: npx vitest run

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Start Firebase Auth Emulator
        run: firebase emulators:start --only auth --project garimpo-500114 &
        working-directory: ${{ github.workspace }}
      - name: Wait for emulator
        run: |
          for i in $(seq 1 15); do
            curl -s http://127.0.0.1:9099/ > /dev/null 2>&1 && break
            sleep 1
          done
      - name: Run E2E tests
        run: npx playwright test
        env:
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
          E2E_TEST_EMAIL: teste-e2e@garimpo.dev
          E2E_TEST_PASSWORD: senha-teste-123
      - name: Upload E2E results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/test-results/
          retention-days: 7

  # ── Service Contracts + API drift ───────────────────────────────────────
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - name: Install yq
        run: |
          sudo wget -qO /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/bin/yq
      - run: mise run checks

  # ── Deploy Backend (Cloud Run) ──────────────────────────────────────────
  # Builds + pushes all images, then deploys. No separate docker job needed.
  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [go, csharp, python, proto, frontend, contracts]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    env:
      REGION: southamerica-east1
      PROJECT_ID: garimpo-500114
      REGISTRY: southamerica-east1-docker.pkg.dev/garimpo-500114/garimpo
    steps:
      - uses: actions/checkout@v5

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push garimpei-api
        run: |
          docker build --platform linux/amd64 --provenance=false \
            -f src/Garimpei.Api/Dockerfile src/ \
            -t ${{ env.REGISTRY }}/garimpei-api-v2:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/garimpei-api-v2:latest
          docker push ${{ env.REGISTRY }}/garimpei-api-v2 --all-tags

      - name: Build & push collector
        run: |
          docker build --platform linux/amd64 --provenance=false \
            -f services/collector/Dockerfile . \
            -t ${{ env.REGISTRY }}/collector:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/collector:latest
          docker push ${{ env.REGISTRY }}/collector --all-tags

      - name: Build & push publisher
        run: |
          docker build --platform linux/amd64 --provenance=false \
            -f services/publisher/Dockerfile . \
            -t ${{ env.REGISTRY }}/publisher:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/publisher:latest
          docker push ${{ env.REGISTRY }}/publisher --all-tags

      - name: Build & push alerter
        run: |
          docker build --platform linux/amd64 --provenance=false \
            -f services/alerter/Dockerfile . \
            -t ${{ env.REGISTRY }}/alerter:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/alerter:latest
          docker push ${{ env.REGISTRY }}/alerter --all-tags

      - name: Build & push scheduler
        run: |
          docker build --platform linux/amd64 --provenance=false \
            -f services/scheduler/Dockerfile . \
            -t ${{ env.REGISTRY }}/scheduler:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/scheduler:latest
          docker push ${{ env.REGISTRY }}/scheduler --all-tags

      - name: Build & push analyzer
        run: |
          docker build --platform linux/amd64 --provenance=false \
            -f services/analyzer/Dockerfile services/analyzer/ \
            -t ${{ env.REGISTRY }}/analyzer:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/analyzer:latest
          docker push ${{ env.REGISTRY }}/analyzer --all-tags

      - name: Deploy to Cloud Run
        run: |
          gcloud run services replace deploy/cloud-run-deploy-now.yaml \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }}

  # ── Deploy Frontend (Cloudflare Pages) ──────────────────────────────────
  deploy-web:
    name: Deploy frontend
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: [frontend, contracts]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - name: Install & build
        run: npm ci && npm run build
        working-directory: web
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: "641900c067ae51982debe5c2a98ff39b"
          command: pages deploy web/build --project-name garimpei-web
