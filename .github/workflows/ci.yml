name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # ── Go (build + test + lint + arch) ──────────────────────────────────────
  go:
    name: Go
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - run: mise run build:go
      - run: mise run test:go
      - run: mise run lint:go
      - run: mise run check:file-size -- 400
      - run: mise run docs:check

  # ── C# (build + test) ───────────────────────────────────────────────────
  csharp:
    name: C#
    runs-on: ubuntu-latest
    timeout-minutes: 8
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: garimpei
          POSTGRES_PASSWORD: garimpei_dev
          POSTGRES_DB: garimpei
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U garimpei"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore src/Garimpei.sln
      - run: dotnet build --no-restore --configuration Release src/Garimpei.sln
      - run: dotnet test --no-build --configuration Release src/Garimpei.sln
        env:
          ConnectionStrings__PostgreSQL: "Host=localhost;Port=5432;Database=garimpei;Username=garimpei;Password=garimpei_dev"

  # ── Python (lint + syntax) ──────────────────────────────────────────────
  python:
    name: Python
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - run: mise run lint:python
      - name: Syntax check
        run: |
          uv pip install --system -r services/analyzer/requirements.txt
          python -c "import sys; sys.path.insert(0, 'services/analyzer'); import main"

  # ── Proto (lint + sync + breaking) ──────────────────────────────────────
  proto:
    name: Proto
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install buf
        run: |
          BUF_VERSION="1.50.0"
          curl -sSL "https://github.com/bufbuild/buf/releases/download/v${BUF_VERSION}/buf-Linux-x86_64" -o /usr/local/bin/buf
          chmod +x /usr/local/bin/buf
      - name: Lint
        run: cd protos && buf lint
      - name: Sync check (Go + C#)
        run: |
          cd protos && buf generate && cd ..
          if ! git diff --exit-code gen/go/ src/Garimpei.Protos/Generated/; then
            echo "❌ Stubs desatualizados. Rode: mise run proto:generate"
            exit 1
          fi
      - name: Breaking changes
        run: cd protos && buf breaking --against '../.git#branch=main'
        continue-on-error: true

  # ── Security (Semgrep SAST) ─────────────────────────────────────────────
  security:
    name: Security (Semgrep)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v7
      - name: Run Semgrep
        run: semgrep scan --config auto --config p/javascript --config p/typescript --error --exclude 'node_modules' --exclude '.svelte-kit' --exclude 'build' --exclude 'docs-site' web/src/ src/
        env:
          SEMGREP_RULES: p/default

  # ── Frontend (build + lint + unit) ────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run build
      - run: bun run lint:css
      - run: bun run lint:js
      - run: bun run format:check
      - run: mise run check:ui-coverage -- --strict
      - run: mise run check:file-size -- 400
      - run: bunx vitest run

  # ── Service Contracts + API drift ───────────────────────────────────────
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - name: Install yq
        run: |
          sudo wget -qO /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/bin/yq
      - run: mise run checks
      - name: Cross-language fixture test
        run: mise run check:fixtures-crosslang

  # ── Deploy Backend (Cloud Run) ──────────────────────────────────────────
  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [go, csharp, python, proto]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.go.result == 'success' &&
      needs.csharp.result == 'success' &&
      needs.python.result == 'success' &&
      needs.proto.result == 'success'
    permissions:
      contents: read
      id-token: write
    env:
      REGION: southamerica-east1
      PROJECT_ID: garimpo-500114
      REGISTRY: southamerica-east1-docker.pkg.dev/garimpo-500114/garimpo
    steps:
      - uses: actions/checkout@v7

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build & push images (parallel)
        run: |
          build_image() {
            local name=$1 dockerfile=$2 context=$3
            echo "::group::Building $name"
            docker buildx build --platform linux/amd64 --provenance=false \
              --cache-from type=gha,scope=$name \
              --cache-to type=gha,mode=max,scope=$name \
              -f "$dockerfile" "$context" \
              -t ${{ env.REGISTRY }}/$name:${{ github.sha }} \
              -t ${{ env.REGISTRY }}/$name:latest \
              --push
            echo "::endgroup::"
          }

          pids=()
          build_image garimpei-api-v2 src/Garimpei.Api/Dockerfile src/ &
          pids+=($!)
          build_image collector services/collector/Dockerfile . &
          pids+=($!)
          build_image publisher services/publisher/Dockerfile . &
          pids+=($!)
          build_image scheduler services/scheduler/Dockerfile . &
          pids+=($!)
          build_image analyzer services/analyzer/Dockerfile services/analyzer/ &
          pids+=($!)
          build_image cache-sidecar services/cache/Dockerfile . &
          pids+=($!)

          # Wait for all parallel builds
          failed=0
          for pid in "${pids[@]}"; do
            if ! wait $pid; then failed=1; fi
          done
          if [[ $failed -ne 0 ]]; then exit 1; fi

      - name: Apply database migrations
        run: |
          CONNECTION_STRING=$(gcloud secrets versions access latest \
            --secret=GARIMPEI_PG_CONNECTION_STRING \
            --project=${{ env.PROJECT_ID }})
          dotnet tool restore
          dotnet restore src/Garimpei.sln
          dotnet ef database update \
            --project src/Garimpei.Infrastructure \
            --startup-project src/Garimpei.Api \
            --connection "$CONNECTION_STRING"

      - name: Deploy to Cloud Run
        run: |
          # Substitui :latest pelo SHA do commit para forçar nova revision
          sed -i "s|:latest|:${{ github.sha }}|g" deploy/cloud-run-deploy-now.yaml
          gcloud run services replace deploy/cloud-run-deploy-now.yaml \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }}

  # ── Deploy Frontend (Cloudflare Pages) ──────────────────────────────────
  deploy-web:
    name: Deploy frontend
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: [frontend]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.frontend.result == 'success'
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install & build
        run: bun install --frozen-lockfile && bun run build
        working-directory: web
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: "641900c067ae51982debe5c2a98ff39b"
          command: pages deploy .svelte-kit/cloudflare --project-name garimpei-web
          workingDirectory: web

  # ── Mutation Testing (on merge to main or label) ─────────────────────────
  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [frontend, csharp]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push'
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - run: bun install --frozen-lockfile
      - name: Restore Stryker incremental cache
        uses: actions/cache@v4
        with:
          path: reports/mutation/stryker-incremental.json
          key: stryker-incremental-${{ github.sha }}
          restore-keys: stryker-incremental-
      - name: StrykerJS (frontend)
        run: bunx stryker run
      - name: Stryker.NET (backend)
        run: |
          cd ../src
          dotnet tool restore
          dotnet stryker -f stryker-config.json
        continue-on-error: true
      - name: Upload mutation reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-reports
          path: |
            reports/mutation/
            reports/mutation-dotnet/
