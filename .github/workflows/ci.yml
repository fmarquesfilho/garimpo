name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'docs-site/**'
      - 'backlog/**'
      - 'README.md'
      - 'src/README.md'
      - 'web/README.md'
      - '*.md'
  pull_request:

jobs:
  # ── Go (build + test + lint + arch) ──────────────────────────────────────
  go:
    name: Go
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - run: mise run build:go
      - run: mise run test:go
      - run: mise run lint:go
      - run: mise run check:file-size -- 400
      - run: mise run docs:check

  # ── C# (build + test) ───────────────────────────────────────────────────
  csharp:
    name: C#
    runs-on: ubuntu-latest
    timeout-minutes: 8
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: garimpei
          POSTGRES_PASSWORD: garimpei_dev
          POSTGRES_DB: garimpei
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U garimpei"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore src/Garimpei.sln
      - run: dotnet build --no-restore --configuration Release src/Garimpei.sln
      - run: dotnet test --no-build --configuration Release src/Garimpei.sln
        env:
          ConnectionStrings__PostgreSQL: "Host=localhost;Port=5432;Database=garimpei;Username=garimpei;Password=garimpei_dev"

  # ── Python (lint + syntax) ──────────────────────────────────────────────
  python:
    name: Python
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - run: mise run lint:python
      - name: Syntax check
        run: |
          pip install -r services/analyzer/requirements.txt --quiet
          python -c "import sys; sys.path.insert(0, 'services/analyzer'); import main"

  # ── Proto (lint + sync + breaking) ──────────────────────────────────────
  proto:
    name: Proto
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@v1
      - name: Lint
        run: cd protos && buf lint
      - name: Sync check (Go + C#)
        run: |
          cd protos && buf generate && cd ..
          if ! git diff --exit-code gen/go/ src/Garimpei.Protos/Generated/; then
            echo "❌ Stubs desatualizados. Rode: mise run proto:generate"
            exit 1
          fi
      - name: Breaking changes
        run: cd protos && buf breaking --against '../.git#branch=main'
        continue-on-error: true

  # ── Security (Semgrep SAST) ─────────────────────────────────────────────
  security:
    name: Security (Semgrep)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v5
      - name: Run Semgrep
        run: semgrep scan --config auto --config p/javascript --config p/typescript --error --exclude 'node_modules' --exclude '.svelte-kit' --exclude 'build' --exclude 'docs-site' web/src/ src/
        env:
          SEMGREP_RULES: p/default

  # ── Frontend (build + lint + unit) ────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run check
      - run: npm run build
      - run: npm run lint:css
      - run: npm run lint:js
      - run: mise run check:ui-coverage -- --strict
      - run: npx vitest run

  # ── Frontend E2E (Playwright + Firebase Auth Emulator) ──────────────────
  frontend-e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [frontend]
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5

      - uses: jdx/mise-action@v2

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: web/node_modules
          key: node-modules-${{ hashFiles('web/package-lock.json') }}

      - name: Install deps
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build & start emulator
        run: |
          cd web && npm run build &
          BUILD_PID=$!
          # Firebase Auth Emulator standalone (sem instalar firebase-tools inteiro)
          curl -sL https://firebase.tools/bin/linux/latest -o /tmp/firebase && chmod +x /tmp/firebase
          /tmp/firebase emulators:start --only auth --project garimpo-500114 &
          wait $BUILD_PID
          # Wait for emulator ready
          for i in $(seq 1 10); do curl -s http://127.0.0.1:9099/ >/dev/null 2>&1 && break; sleep 1; done
        working-directory: ${{ github.workspace }}

      - name: Run E2E tests
        run: npx playwright test
        env:
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
          E2E_TEST_EMAIL: teste-e2e@garimpo.dev
          E2E_TEST_PASSWORD: senha-teste-123

      - name: Upload E2E results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/test-results/
          retention-days: 7

  # ── Service Contracts + API drift ───────────────────────────────────────
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - name: Install yq
        run: |
          sudo wget -qO /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/bin/yq
      - run: mise run checks

  # ── Deploy Backend (Cloud Run) ──────────────────────────────────────────
  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [go, csharp, python, proto, frontend, frontend-e2e, contracts]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    env:
      REGION: southamerica-east1
      PROJECT_ID: garimpo-500114
      REGISTRY: southamerica-east1-docker.pkg.dev/garimpo-500114/garimpo
    steps:
      - uses: actions/checkout@v5

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'src/**'
            go:
              - 'go.mod'
              - 'go.sum'
              - 'internal/**'
              - 'services/collector/**'
              - 'services/publisher/**'
              - 'services/alerter/**'
              - 'services/scheduler/**'
              - 'gen/**'
            analyzer:
              - 'services/analyzer/**'

      - name: Build & push images (parallel)
        run: |
          build_image() {
            local name=$1 dockerfile=$2 context=$3
            echo "::group::Building $name"
            docker buildx build --platform linux/amd64 --provenance=false \
              --cache-from type=gha,scope=$name \
              --cache-to type=gha,mode=max,scope=$name \
              -f "$dockerfile" "$context" \
              -t ${{ env.REGISTRY }}/$name:${{ github.sha }} \
              -t ${{ env.REGISTRY }}/$name:latest \
              --push
            echo "::endgroup::"
          }

          pids=()

          # C# API — build if src/ changed or first deploy
          if [[ "${{ steps.changes.outputs.api }}" == "true" ]] || \
             ! gcloud artifacts docker images describe ${{ env.REGISTRY }}/garimpei-api-v2:latest 2>/dev/null; then
            build_image garimpei-api-v2 src/Garimpei.Api/Dockerfile src/ &
            pids+=($!)
          fi

          # Go services — build if go code changed
          if [[ "${{ steps.changes.outputs.go }}" == "true" ]] || \
             ! gcloud artifacts docker images describe ${{ env.REGISTRY }}/collector:latest 2>/dev/null; then
            build_image collector services/collector/Dockerfile . &
            pids+=($!)
            build_image publisher services/publisher/Dockerfile . &
            pids+=($!)
            build_image alerter services/alerter/Dockerfile . &
            pids+=($!)
            build_image scheduler services/scheduler/Dockerfile . &
            pids+=($!)
          fi

          # Python analyzer — build if analyzer changed
          if [[ "${{ steps.changes.outputs.analyzer }}" == "true" ]] || \
             ! gcloud artifacts docker images describe ${{ env.REGISTRY }}/analyzer:latest 2>/dev/null; then
            build_image analyzer services/analyzer/Dockerfile services/analyzer/ &
            pids+=($!)
          fi

          # Wait for all parallel builds
          failed=0
          for pid in "${pids[@]}"; do
            if ! wait $pid; then failed=1; fi
          done
          if [[ $failed -ne 0 ]]; then exit 1; fi

      - name: Deploy to Cloud Run
        run: |
          gcloud run services replace deploy/cloud-run-deploy-now.yaml \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }}

  # ── Deploy Frontend (Cloudflare Pages) ──────────────────────────────────
  deploy-web:
    name: Deploy frontend
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: [frontend, contracts]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - name: Install & build
        run: npm ci && npm run build
        working-directory: web
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: "641900c067ae51982debe5c2a98ff39b"
          command: pages deploy web/build --project-name garimpei-web
