  #     COLLECTOR_CONFIG: /etc/garimpei/collector.yaml
  #     SHOPEE_APP_ID: ${SHOPEE_APP_ID}
  #     SHOPEE_SECRET: ${SHOPEE_SECRET}
  #     AMAZON_PARTNER_TAG: ${AMAZON_PARTNER_TAG}
