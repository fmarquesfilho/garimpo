  # shopee-collector:
  #   build:
  #     context: .
  #     dockerfile: services/collector/Dockerfile
  #   ports:
  #     - "50051:50051"
  #   environment:
  #     BIGQUERY_EMULATOR_HOST: bigquery-emulator:9050
  #
  # publisher:
  #   build:
  #     context: .
  #     dockerfile: services/publisher/Dockerfile
  #   ports:
  #     - "50052:50052"
  #
  # alerter:
  #   build:
  #     context: .
  #     dockerfile: services/alerter/Dockerfile
