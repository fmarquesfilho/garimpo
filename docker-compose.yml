  # ── Analyzer (Python FastAPI) ────────────────────────────────────────────
  analyzer:
    build:
      context: ./services/analyzer
    ports:
      - "8060:8060"
    environment:
      BQ_PROJECT: garimpei-dev
      BQ_DATASET: garimpo
      BIGQUERY_EMULATOR_HOST: bigquery-emulator:9050
      MOCK_DATA: "${MOCK_DATA:-false}"
    depends_on:
      - bigquery-emulator

volumes:
  pgdata:
