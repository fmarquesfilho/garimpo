apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: garimpei-v2
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "2"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/container-dependencies: '{"garimpei-api":["collector","publisher","scheduler","analyzer"]}'
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - name: garimpei-api
          image: southamerica-east1-docker.pkg.dev/garimpo-500114/garimpo/garimpei-api-v2:latest
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: Auth__ProjectId
              value: garimpo-500114
            - name: ConnectionStrings__PostgreSQL
              valueFrom:
                secretKeyRef:
                  name: GARIMPEI_PG_CONNECTION_STRING
                  key: latest
            - name: Analyzer__BaseUrl
              value: "http://localhost:8060"
            - name: Grpc__CollectorAddress
              value: "http://localhost:50051"
            - name: Grpc__PublisherAddress
              value: "http://localhost:50052"
            - name: AdminEmails
              value: "mandacaruestudio@gmail.com"
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 10

        - name: collector
          image: southamerica-east1-docker.pkg.dev/garimpo-500114/garimpo/collector:latest
          env:
            - name: PORT
              value: "50051"
            - name: SHOPEE_APP_ID
              valueFrom:
                secretKeyRef:
                  name: SHOPEE_APP_ID
                  key: latest
            - name: SHOPEE_SECRET
              valueFrom:
                secretKeyRef:
                  name: SHOPEE_SECRET
                  key: latest
          resources:
            limits:
              cpu: "0.5"
              memory: 256Mi
          startupProbe:
            tcpSocket:
              port: 50051
            periodSeconds: 3
            failureThreshold: 5

        - name: publisher
          image: southamerica-east1-docker.pkg.dev/garimpo-500114/garimpo/publisher:latest
          env:
            - name: PORT
              value: "50052"
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: TELEGRAM_BOT_TOKEN
                  key: latest
          resources:
            limits:
              cpu: "0.25"
              memory: 128Mi
          startupProbe:
            tcpSocket:
              port: 50052
            periodSeconds: 3
            failureThreshold: 5

        - name: scheduler
          image: southamerica-east1-docker.pkg.dev/garimpo-500114/garimpo/scheduler:latest
          env:
            - name: PORT
              value: "50054"
            - name: COLLECTOR_ADDR
              value: "localhost:50051"
            - name: PUBLISHER_ADDR
              value: "localhost:50052"
            - name: ANALYZER_URL
              value: "http://localhost:8060"
            - name: GCP_PROJECT_ID
              value: "garimpo-500114"
            - name: CLOUD_TASKS_LOCATION
              value: "southamerica-east1"
            - name: ALERT_QUEUE_ID
              value: "price-alerts"
            - name: ALERT_TARGET_URL
              value: "https://garimpei-v2-vj6afttbza-rj.a.run.app/process-alert"
            - name: ALERT_SA_EMAIL
              value: "garimpo-api-sa@garimpo-500114.iam.gserviceaccount.com"
            - name: ALERT_CHAT_ID
              value: "-1003827989143"
            - name: HTTP_PORT
              value: "8054"
          resources:
            limits:
              cpu: "0.25"
              memory: 128Mi
          startupProbe:
            tcpSocket:
              port: 50054
            periodSeconds: 3
            failureThreshold: 5

        - name: analyzer
          image: southamerica-east1-docker.pkg.dev/garimpo-500114/garimpo/analyzer:latest
          env:
            - name: BQ_PROJECT
              value: garimpo-500114
            - name: BQ_DATASET
              value: garimpo
            - name: PORT
              value: "8060"
          resources:
            limits:
              cpu: "0.5"
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /health
              port: 8060
            periodSeconds: 3
            failureThreshold: 10
# trigger deploy
