# nginx do Garimpo. Copie para /etc/nginx/sites-available/garimpo,
# crie o link em sites-enabled, teste (sudo nginx -t) e recarregue.
# Depois rode  sudo certbot --nginx -d garimpo.SEUDOMINIO  para o TLS.
server {
    listen 80;
    server_name garimpo.SEUDOMINIO;          # troque pelo seu domínio/subdomínio

    root /var/www/garimpo;                    # onde o site estático é publicado
    index index.html;

    # API: tudo em /api/ vai para o backend Go (mesma origem -> sem CORS).
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;               # chamadas à Shopee podem demorar
    }

    # Site: tenta o arquivo, depois a versão .html, e cai no fallback SPA.
    location / {
        try_files $uri $uri.html /200.html;
    }

    # Cache longo para os assets versionados do SvelteKit.
    location /_app/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
