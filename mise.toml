# ═══════════════════════════════════════════════════════════════════════════════
# mise.toml — Garimpei
# ═══════════════════════════════════════════════════════════════════════════════
# Task runner + version manager para o monorepo polyglot.
#
# Uso:
#   mise install          → instala todas as ferramentas declaradas
#   mise run checks       → roda todos os checks de integridade
#   mise run build        → builda Go + C#
#   mise run test         → roda todos os testes
#   mise tasks            → lista todas as tasks disponíveis
# ═══════════════════════════════════════════════════════════════════════════════

[tools]
go = "1.26"
node = "24"
python = "3.13"
uv = "latest"
"go:github.com/golangci/golangci-lint/cmd/golangci-lint" = "latest"
"go:github.com/arch-go/arch-go" = "latest"

[env]
GARIMPEI_ENV = "development"

# ── Build ─────────────────────────────────────────────────────────────────────

[tasks.build]
description = "Build de todos os projetos (Go + C#)"
depends = ["build:go", "build:csharp"]

[tasks."build:go"]
description = "Build dos serviços Go"
run = "go build ./..."

[tasks."build:csharp"]
description = "Build da solution C#"
run = "dotnet build --nologo src/Garimpei.sln"

# ── Test ──────────────────────────────────────────────────────────────────────

[tasks.test]
description = "Roda todos os testes (Go + C# + Web)"
depends = ["test:go", "test:csharp", "test:web"]

[tasks."test:go"]
description = "Testes Go"
run = "go test ./..."

[tasks."test:csharp"]
description = "Testes C#"
depends = ["build:csharp"]
run = "dotnet test --nologo --no-build src/Garimpei.sln"

# ── Lint ──────────────────────────────────────────────────────────────────────

[tasks.lint]
description = "Roda todos os linters"
depends = ["lint:go", "lint:python", "lint:web"]

[tasks."lint:go"]
description = "golangci-lint + arch-go"
run = """
golangci-lint run ./...
arch-go
"""

[tasks."lint:python"]
description = "Ruff lint no analyzer"
run = "uvx ruff check services/analyzer/"

[tasks."lint:web"]
description = "ESLint + Stylelint + npm audit no frontend"
run = "cd web && npm run lint:js && npm run lint:css && npm audit --audit-level=high"

# ── Checks (file tasks em .mise/tasks/check/) ─────────────────────────────────

[tasks.checks]
description = "Roda todos os checks de integridade"
depends = [
  "check:service-contracts",
  "check:api-contract",
  "check:config-consistency",
  "check:schema-sync",
  "check:data-ownership",
  "check:stale-refs",
  "check:docs-drift",
  "check:web",
]

# ── Docs ──────────────────────────────────────────────────────────────────────

[tasks.docs]
description = "Gera toda a documentação (ER, env, board, sync)"
depends = ["docs:er", "docs:env", "docs:board", "docs:sync"]

[tasks."docs:er"]
description = "Gera Mermaid ER do schema BigQuery"
run = "go run ./cmd/gen-er > docs/gerado/ENTIDADES.md"

[tasks."docs:board"]
description = "Gera quadro Kanban do backlog"
run = "go run ./cmd/gen-board"

[tasks."docs:check"]
description = "CI: verifica se docs geradas e docs-site estão atualizadas"
run = "bash .mise/tasks/check/docs-drift"

# ── Proto (gRPC) ──────────────────────────────────────────────────────────────

[tasks."proto:generate"]
description = "Gera stubs Go e C# a partir dos .proto"
run = "cd protos && buf generate"

[tasks."proto:lint"]
description = "Lint nos .proto files"
run = "cd protos && buf lint"

[tasks."proto:breaking"]
description = "Verifica breaking changes nos protos"
run = "cd protos && buf breaking --against '../.git#branch=main'"

# ── Docker Compose (dev local) ────────────────────────────────────────────────

[tasks.up]
description = "Sobe todos os serviços (dev local)"
run = "docker compose up -d"

[tasks.down]
description = "Para todos os serviços"
run = "docker compose down"

[tasks.logs]
description = "Logs de todos os containers"
run = "docker compose logs -f"

# ── Atalhos ───────────────────────────────────────────────────────────────────

[tasks.ci]
description = "Simula o CI completo localmente"
depends = ["build", "test", "lint", "checks"]

[tasks.prepush]
description = "Verificação pré-push (equivalente ao hook)"
depends = ["build", "test", "lint", "checks"]

# ── Frontend (tasks específicas) ──────────────────────────────────────────────

[tasks."check:web"]
description = "svelte-check (tipos, props, a11y, CSS unused) — strict, zero tolerance"
run = "cd web && npx svelte-kit sync && npm run check"

[tasks."test:web"]
description = "Vitest (unit + contrast + theme) no frontend"
run = "cd web && npx vitest run"

