# ═══════════════════════════════════════════════════════════════════════════════
# mise.toml — Garimpei
# ═══════════════════════════════════════════════════════════════════════════════
# Task runner + version manager para o monorepo polyglot.
#
# Uso:
#   mise install          → instala todas as ferramentas declaradas
#   mise run checks       → roda todos os checks de integridade
#   mise run build        → builda Go + C#
#   mise run test         → roda todos os testes
#   mise tasks            → lista todas as tasks disponíveis
# ═══════════════════════════════════════════════════════════════════════════════

[tools]
go = "1.26"
node = "24"
python = "3.13"
uv = "latest"
"go:github.com/golangci/golangci-lint/cmd/golangci-lint" = "latest"
"go:github.com/arch-go/arch-go" = "latest"

[env]
GARIMPEI_ENV = "development"

# ── Build ─────────────────────────────────────────────────────────────────────

[tasks.build]
description = "Build de todos os projetos (Go + C#)"
depends = ["build:go", "build:csharp"]

[tasks."build:go"]
description = "Build dos serviços Go"
run = "go build ./..."

[tasks."build:csharp"]
description = "Build da solution C#"
# -m:1 + -nodeReuse:false evitam MSB4166 ("Child node exited prematurely"): sob a
# concorrência do `prepush` (go build/test + svelte-check + prettier em paralelo), os
# worker nodes do MSBuild com node-reuse eram estarvados e o scheduler os declarava
# mortos. Nó único, sem reuso — build determinístico dentro do hook.
env = { MSBUILDDISABLENODEREUSE = "1" }
run = "dotnet build --nologo -m:1 -nodeReuse:false src/Garimpei.sln"

# ── Test ──────────────────────────────────────────────────────────────────────

[tasks.test]
description = "Roda todos os testes (Go + C# + Web)"
depends = ["test:go", "test:csharp", "test:web"]

[tasks."test:go"]
description = "Testes Go"
run = "go test ./..."

[tasks."test:csharp"]
description = "Testes C# (sobe PostgreSQL via Docker se necessário)"
depends = ["build:csharp"]
run = """
# Verifica se Docker está acessível
if ! docker info &>/dev/null; then
  echo "⚠️  Docker indisponível — pulando test:csharp (testes rodarão no CI)"
  exit 0
fi
# Garante que PostgreSQL está rodando
if ! docker compose ps postgres 2>/dev/null | grep -q "running"; then
  echo "🐘 Iniciando PostgreSQL..."
  docker compose up -d postgres
  sleep 3
fi
# Aplica migrations pendentes
CONNECTION_STRING="Host=localhost;Port=5432;Database=garimpei;Username=garimpei;Password=garimpei_dev" \
  dotnet ef database update --project src/Garimpei.Infrastructure --startup-project src/Garimpei.Api --no-build 2>/dev/null || true
# Roda testes
ConnectionStrings__PostgreSQL="Host=localhost;Port=5432;Database=garimpei;Username=garimpei;Password=garimpei_dev" \
  dotnet test --nologo --no-build src/Garimpei.sln
"""

# ── Lint ──────────────────────────────────────────────────────────────────────

[tasks.lint]
description = "Roda todos os linters"
depends = ["lint:go", "lint:python", "lint:web"]

[tasks."lint:go"]
description = "golangci-lint + arch-go"
run = """
golangci-lint run ./...
arch-go
"""

[tasks."lint:python"]
description = "Ruff lint no analyzer"
run = "uvx ruff check services/analyzer/"

[tasks."lint:web"]
description = "ESLint + Stylelint + Semgrep no frontend"
run = "cd web && bun run lint:js && bun run lint:css && bun run lint:security"

# ── Checks (file tasks em .mise/tasks/check/) ─────────────────────────────────

[tasks.checks]
description = "Roda todos os checks de integridade"
depends = [
  "check:service-contracts",
  "check:api-contract",
  "check:config-consistency",
  "check:schema-sync",
  "check:data-ownership",
  "check:stale-refs",
  "check:docs-drift",
]

# ── Docs ──────────────────────────────────────────────────────────────────────

[tasks.docs]
description = "Gera toda a documentação (ER, env, board, api-reference, sync)"
depends = ["docs:er", "docs:env", "docs:board", "docs:sync"]

[tasks."docs:er"]
description = "Gera Mermaid ER do schema BigQuery"
run = "go run ./cmd/gen-er > docs/gerado/ENTIDADES.md"

[tasks."docs:board"]
description = "Gera quadro Kanban do backlog"
run = "go run ./cmd/gen-board"

[tasks."docs:check"]
description = "CI: verifica se docs geradas e docs-site estão atualizadas"
run = "bash .mise/tasks/check/docs-drift"

# ── Proto (gRPC) ──────────────────────────────────────────────────────────────

[tasks."proto:generate"]
description = "Gera stubs Go e C# a partir dos .proto"
run = "cd protos && buf generate"

[tasks."proto:lint"]
description = "Lint nos .proto files"
run = "cd protos && buf lint"

[tasks."proto:breaking"]
description = "Verifica breaking changes nos protos"
run = "cd protos && buf breaking --against '../.git#branch=main'"

# ── Docker Compose (dev local) ────────────────────────────────────────────────

[tasks.up]
description = "Sobe todos os serviços (dev local)"
run = "docker compose up -d"

[tasks.down]
description = "Para todos os serviços"
run = "docker compose down"

[tasks.logs]
description = "Logs de todos os containers"
run = "docker compose logs -f"

[tasks."deploy:migrate"]
description = "Aplica EF Core migrations no banco de produção (Neon)"
run = """
echo "🐘 Aplicando migrations no banco de produção..."

CONNECTION_STRING=$(gcloud secrets versions access latest \
  --secret=GARIMPEI_PG_CONNECTION_STRING \
  --project=garimpo-500114 2>&1)

if echo "$CONNECTION_STRING" | grep -q "ERROR"; then
  echo "❌ Falha ao ler secret. Verifique: gcloud auth login"
  exit 1
fi

dotnet tool restore
dotnet ef database update \
  --project src/Garimpei.Infrastructure \
  --startup-project src/Garimpei.Api \
  --connection "$CONNECTION_STRING"

echo "✅ Migrations aplicadas com sucesso."
"""

# ── Atalhos ───────────────────────────────────────────────────────────────────

[tasks.ci]
description = "Simula o CI completo localmente"
depends = ["build", "test", "lint", "checks", "check:file-size"]

[tasks.prepush]
description = "Verificação pré-push (rápido, ~1min)"
depends = ["build", "test", "lint", "checks", "check:web", "check:file-size", "check:format"]

# ── Frontend (tasks específicas) ──────────────────────────────────────────────

[tasks."check:web"]
description = "svelte-check (tipos, props, a11y, CSS unused) — strict, zero tolerance"
run = "cd web && bun run check"

[tasks."check:file-size"]
description = "Verifica tamanho máximo de arquivos (400 linhas prod, 900 testes)"
run = "bash .mise/tasks/check/file-size 400"

[tasks."check:format"]
description = "Verifica formatação Prettier (sem alterar arquivos)"
run = "cd web && npx prettier --check src/ tests/"

[tasks."test:web"]
description = "Vitest (unit + contrast + theme) no frontend"
run = "cd web && npx vitest run"

[tasks."test:e2e"]
description = "Playwright E2E com Firebase Auth Emulator (inicia automaticamente)"
run = """
cd web && bun run build

# Inicia emulator se não estiver rodando
EMULATOR_STARTED=0
if ! curl -s http://localhost:9099/ > /dev/null 2>&1; then
  echo "🔥 Iniciando Firebase Auth Emulator..."
  firebase emulators:start --only auth --project garimpo-500114 &
  EMULATOR_PID=$!
  EMULATOR_STARTED=1
  # Aguarda ficar pronto
  for i in $(seq 1 15); do
    curl -s http://localhost:9099/ > /dev/null 2>&1 && break
    sleep 1
  done
  if ! curl -s http://localhost:9099/ > /dev/null 2>&1; then
    echo "⚠️  Emulator não iniciou (firebase CLI instalado?). Pulando E2E."
    kill $EMULATOR_PID 2>/dev/null || true
    exit 0
  fi
fi

echo "✅ Emulator pronto. Rodando E2E..."
FIREBASE_AUTH_EMULATOR_HOST=localhost:9099 npx playwright test
EXIT_CODE=$?

# Para o emulator se nós o iniciamos
if [ $EMULATOR_STARTED -eq 1 ]; then
  kill $EMULATOR_PID 2>/dev/null || true
fi

exit $EXIT_CODE
"""

[tasks."test:e2e:lojas"]
description = "E2E ResolveShop (integração real: API + Collector + Shopee)"
run = """
# Pré-requisitos: API C# + PostgreSQL + Firebase Emulator + Collector Go

# 1. Garante que PostgreSQL está rodando
if ! docker compose ps postgres 2>/dev/null | grep -q "running"; then
  echo "🐘 Subindo PostgreSQL..."
  docker compose up -d postgres
  for i in $(seq 1 15); do
    docker compose ps postgres 2>/dev/null | grep -q "healthy" && break
    sleep 1
  done
fi

# 2. Cria override temporário para apontar gRPC + Firebase para o host
cat > docker-compose.override.yml <<EOF
services:
  garimpei-api-v2:
    environment:
      Grpc__CollectorAddress: "http://host.docker.internal:50051"
      Grpc__PublisherAddress: "http://host.docker.internal:50052"
      FIREBASE_AUTH_EMULATOR_HOST: "host.docker.internal:9099"
EOF

echo "🐳 Subindo API C# (apontando gRPC + Firebase para o host)..."
docker compose up -d garimpei-api-v2 --force-recreate
rm -f docker-compose.override.yml

# Aguarda ficar healthy
for i in $(seq 1 20); do
  curl -s http://localhost:8090/api/health > /dev/null 2>&1 && break
  sleep 1
done
if ! curl -s http://localhost:8090/api/health > /dev/null 2>&1; then
  echo "❌ API não ficou healthy."
  exit 1
fi

# 2. Verifica/inicia Collector Go
COLLECTOR_STARTED=0
if ! grpcurl -plaintext localhost:50051 grpc.health.v1.Health/Check > /dev/null 2>&1; then
  echo "⚙️  Iniciando Collector Go..."
  cd services/collector && go run . &
  COLLECTOR_PID=$!
  COLLECTOR_STARTED=1
  # Aguarda ficar pronto
  for i in $(seq 1 10); do
    grpcurl -plaintext localhost:50051 grpc.health.v1.Health/Check > /dev/null 2>&1 && break
    sleep 1
  done
  if ! grpcurl -plaintext localhost:50051 grpc.health.v1.Health/Check > /dev/null 2>&1; then
    echo "❌ Collector não iniciou. Verifique services/collector/"
    kill $COLLECTOR_PID 2>/dev/null || true
    exit 1
  fi
  cd ../..
fi

# 3. Verifica/inicia Firebase Auth Emulator
EMULATOR_STARTED=0
if ! curl -s http://localhost:9099/ > /dev/null 2>&1; then
  echo "🔥 Iniciando Firebase Auth Emulator..."
  firebase emulators:start --only auth --project garimpo-500114 &
  EMULATOR_PID=$!
  EMULATOR_STARTED=1
  for i in $(seq 1 15); do
    curl -s http://localhost:9099/ > /dev/null 2>&1 && break
    sleep 1
  done
  if ! curl -s http://localhost:9099/ > /dev/null 2>&1; then
    echo "⚠️  Emulator não iniciou. Pulando teste."
    kill $EMULATOR_PID 2>/dev/null || true
    [ $COLLECTOR_STARTED -eq 1 ] && kill $COLLECTOR_PID 2>/dev/null || true
    exit 0
  fi
fi

# 4. Build frontend + roda apenas o teste de lojas
echo "✅ Todos os serviços prontos. Rodando E2E ResolveShop..."
cd web && bun run build
FIREBASE_AUTH_EMULATOR_HOST=localhost:9099 npx playwright test lojas-resolve-shop
EXIT_CODE=$?

# Cleanup
[ $EMULATOR_STARTED -eq 1 ] && kill $EMULATOR_PID 2>/dev/null || true
[ $COLLECTOR_STARTED -eq 1 ] && kill $COLLECTOR_PID 2>/dev/null || true

exit $EXIT_CODE
"""


