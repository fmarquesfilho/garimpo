version: "1.0"

# ═══════════════════════════════════════════════════════════════════════════════
# Contract Registry — Garimpei
# ═══════════════════════════════════════════════════════════════════════════════
# Declaração centralizada de todos os serviços, fronteiras de integração e
# fluxos de orquestração. Validado automaticamente pelo CI via
# .mise/tasks/check/service-contracts.
#
# Para adicionar uma nova fronteira, veja contracts/README.md.
# ═══════════════════════════════════════════════════════════════════════════════

services:
  - id: csharp-api
    name: "Garimpei API (C#)"
    runtime: cloud-run
    port: 8080

  - id: publisher
    name: "Publisher (Go)"
    runtime: cloud-run-sidecar
    port: 50052
    proto: protos/publisher/v1/publisher.proto

  - id: collector
    name: "Collector (Go)"
    runtime: cloud-run-sidecar
    port: 50051
    proto: protos/collector/v1/collector.proto

  - id: scheduler
    name: "Scheduler (Go)"
    runtime: cloud-run-sidecar
    port: 50054
    http_port: 8054
    proto: protos/scheduler/v1/scheduler.proto

  - id: analyzer
    name: "Analyzer (Python)"
    runtime: cloud-run-sidecar
    port: 8060

  - id: frontend
    name: "Frontend (Svelte)"
    runtime: cloudflare-pages

  - id: rules
    name: "Regras de Busca (JSON declarativo)"
    runtime: static
    path: rules/busca-rules.json
    schema: rules/busca-rules.schema.json
    notes: "Fonte de verdade para intent table, guards, normalização. Consumido pelo frontend em build-time e validado no CI."

# ── Fronteiras (boundaries) ───────────────────────────────────────────────────
# Cada entrada é um ponto de comunicação entre dois serviços.
# O validador verifica que o path/method existe no código correspondente.

boundaries:
  # ── Frontend → C# API (HTTP/JSON) ──────────────────────────────────────────
  - id: fe-publicacoes-post
    source: frontend
    target: csharp-api
    protocol: http
    method: POST
    path: /api/publicacoes
    request_schema: contracts/schemas/publicacoes.request.json
    response_schema: contracts/schemas/publicacoes.response.json
    notes: |
      Envio imediato (sem agendada_em) DEVE triggerar gRPC Publish.
      Agendamento apenas salva no banco com status "agendada".

  - id: fe-publicacoes-get
    source: frontend
    target: csharp-api
    protocol: http
    method: GET
    path: /api/publicacoes

  - id: fe-publicar
    source: frontend
    target: csharp-api
    protocol: http
    method: POST
    path: /api/publicar
    request_schema: contracts/schemas/publicar.request.json
    notes: "Envio imediato legacy. Resolve destino_id → chat_id antes de chamar gRPC."

  - id: fe-buscas-get
    source: frontend
    target: csharp-api
    protocol: http
    method: GET
    path: /api/buscas
    response_schema: contracts/schemas/buscas.response.json
    notes: "keywords DEVE ser array JSON, nunca string única ou comma-separated."

  - id: fe-buscas-post
    source: frontend
    target: csharp-api
    protocol: http
    method: POST
    path: /api/buscas
    request_schema: contracts/schemas/buscas.request.json
    notes: "keywords aceita array de strings."

  - id: fe-destinos-get
    source: frontend
    target: csharp-api
    protocol: http
    method: GET
    path: /api/destinos
    response_schema: contracts/schemas/destinos.response.json

  - id: fe-destinos-post
    source: frontend
    target: csharp-api
    protocol: http
    method: POST
    path: /api/destinos

  - id: fe-templates-get
    source: frontend
    target: csharp-api
    protocol: http
    method: GET
    path: /api/templates

  - id: fe-favoritos-get
    source: frontend
    target: csharp-api
    protocol: http
    method: GET
    path: /api/favoritos

  - id: fe-lojas-post
    source: frontend
    target: csharp-api
    protocol: http
    method: POST
    path: /api/lojas
    request_schema: contracts/schemas/lojas.request.json
    response_schema: contracts/schemas/lojas.response.json
    notes: "Resolve URL/username → shop_id via Collector gRPC (marketplace parametrizável via origem_padrao)."

  - id: fe-candidatos
    source: frontend
    target: csharp-api
    protocol: http
    method: GET
    path: /api/candidatos

  - id: fe-categorias
    source: frontend
    target: csharp-api
    protocol: http
    method: GET
    path: /api/categorias

  - id: fe-alertas
    source: frontend
    target: csharp-api
    protocol: http
    method: GET
    path: /api/alertas

  - id: fe-onboarding
    source: frontend
    target: csharp-api
    protocol: http
    method: GET
    path: /api/onboarding/status

  - id: fe-conversoes
    source: frontend
    target: csharp-api
    protocol: http
    method: GET
    path: /api/conversoes/reais

  - id: fe-resolver-link
    source: frontend
    target: csharp-api
    protocol: http
    method: POST
    path: /api/resolver-link

  # ── C# API → Go Sidecars (gRPC) ────────────────────────────────────────────
  - id: api-publisher-publish
    source: csharp-api
    target: publisher
    protocol: grpc
    service: publisher.v1.PublisherService
    method: Publish
    notes: |
      group_id DEVE ser o chat_id resolvido (ex: @mileseleciona, -1001234).
      NUNCA um UUID do PostgreSQL. A resolução acontece via GroupId_Resolution
      no C# antes de chamar o gRPC.

  - id: api-publisher-list
    source: csharp-api
    target: publisher
    protocol: grpc
    service: publisher.v1.PublisherService
    method: ListGroups

  - id: api-collector-fetch
    source: csharp-api
    target: collector
    protocol: grpc
    service: collector.v1.CollectorService
    method: Fetch

  - id: api-collector-resolve-shop
    source: csharp-api
    target: collector
    protocol: grpc
    service: collector.v1.CollectorService
    method: ResolveShop

  - id: api-collector-generate-link
    source: csharp-api
    target: collector
    protocol: grpc
    service: collector.v1.CollectorService
    method: GenerateAffiliateLink
    notes: "Gera link curto de afiliada via Shopee generateShortLink com sub_ids para rastreamento de conversões."

  - id: api-scheduler-set-schedule
    source: csharp-api
    target: scheduler
    protocol: grpc
    service: scheduler.v1.SchedulerService
    method: SetSchedule
    notes: "Registra/pausa job de coleta periódica ao criar/remover buscas agendadas."

  # ── C# API → Python Analyzer (HTTP) ────────────────────────────────────────
  - id: api-analyzer-candidatos
    source: csharp-api
    target: analyzer
    protocol: http
    method: GET
    path: /candidatos
    notes: "Curadoria/scoring de produtos."

  - id: api-analyzer-estatisticas
    source: csharp-api
    target: analyzer
    protocol: http
    method: GET
    path: /estatisticas

  - id: api-analyzer-novidades
    source: csharp-api
    target: analyzer
    protocol: http
    method: GET
    path: /novidades

  # ── Scheduler → Sidecars ───────────────────────────────────────────────────
  - id: scheduler-collector-fetch
    source: scheduler
    target: collector
    protocol: grpc
    service: collector.v1.CollectorService
    method: Fetch

  - id: scheduler-analyzer-detect
    source: scheduler
    target: analyzer
    protocol: http
    method: POST
    path: /detect-coupons

# ── Fluxos de orquestração ────────────────────────────────────────────────────
# Cada fluxo documenta o caminho end-to-end de um processo de negócio.
# O validador verifica que os boundary IDs referenciados existem acima.

flows:
  # ── Fluxos disparados pelo usuário ─────────────────────────────────────────

  discover:
    name: "Descobrir Produtos"
    trigger: user
    steps:
      - boundary: fe-candidatos
        action: "Usuário busca por keyword/categoria"
      - boundary: api-collector-fetch
        action: "C# chama Collector gRPC Fetch(keyword, marketplace)"
      - action: "Collector consulta Shopee/Amazon API"
      - action: "C# aplica ScoringService.Rank + eligibility filter"
    data_flow: ["{none}"]

  publish:
    name: "Publicar Oferta (Manual)"
    trigger: user
    steps:
      - boundary: fe-publicacoes-post
        action: "Frontend envia produto + destino_id + legenda"
      - action: "C# resolve destino_id → chat_id via PostgreSQL"
      - boundary: api-publisher-publish
        action: "C# chama Publisher.Publish gRPC com chat_id resolvido"
      - action: "Publisher envia via Telegram/WhatsApp"
    data_flow: ["read:postgresql:Destinos", "write:postgresql:Publicacoes"]

  monitor-shops:
    name: "Monitorar Lojas (Novidades/Variações)"
    trigger: user
    steps:
      - boundary: api-analyzer-novidades
        action: "C# proxy GET /novidades para Analyzer"
      - action: "Analyzer query BigQuery snapshots (window functions)"
    data_flow: ["read:bigquery:snapshots"]

  publish-from-variation:
    name: "Publicar a partir de Variação"
    trigger: user
    steps:
      - action: "Frontend navega /publicar com preco_atual preenchido"
      - boundary: fe-publicacoes-post
        action: "Confirma e envia"
      - boundary: api-publisher-publish
        action: "C# resolve destino e chama Publisher"
    data_flow: ["read:postgresql:Destinos", "write:postgresql:Publicacoes"]

  onboarding:
    name: "Onboarding Multi-Tenant"
    trigger: user
    steps:
      - boundary: fe-onboarding
        action: "Steps: termos → shopee → telegram → validar"
    data_flow: ["write:postgresql:TenantConfigs"]

  sync-buscas:
    name: "Sincronização de Buscas"
    trigger: user
    steps:
      - boundary: fe-buscas-post
        action: "Frontend salva busca"
      - boundary: fe-buscas-get
        action: "Frontend carrega do servidor"
    data_flow: ["read:postgresql:Buscas", "write:postgresql:Buscas"]

  add-loja:
    name: "Adição de Loja (Resolver Shop ID + Agendar Coleta)"
    trigger: user
    steps:
      - boundary: fe-lojas-post
        action: "Frontend envia URL ou nome da loja (+ keywords opcionais)"
      - boundary: api-collector-resolve-shop
        action: "C# API solicita resolução de URL/Username para Shop ID via gRPC"
      - action: "Collector busca dados reais da loja na Shopee"
      - boundary: api-scheduler-set-schedule
        action: "C# API registra job de coleta periódica no Scheduler"
    data_flow: ["write:postgresql:Buscas"]

  # ── Fluxos automáticos (scheduler/cron) ────────────────────────────────────

  scheduled-collection:
    name: "Coleta Agendada de Produtos"
    trigger: cron
    schedule: "a cada 8h"
    steps:
      - boundary: scheduler-collector-fetch
        action: "Scheduler dispara Collector.Fetch por keyword/loja"
      - action: "Collector grava snapshots no BigQuery (append-only)"
    data_flow: ["write:bigquery:snapshots"]

  price-alert:
    name: "Alerta Automático de Preço"
    trigger: post-collection
    steps:
      - action: "Scheduler cria Cloud Task (queue: price-alerts)"
      - action: "Cloud Tasks despacha POST /process-alert (1 msg/s)"
      - action: "Scheduler HTTP chama Analyzer GET /quedas"
      - action: "Scheduler formata mensagem e chama Publisher gRPC"
    data_flow: ["read:bigquery:snapshots"]

  coupon-collection:
    name: "Coleta de Cupons Multi-Marketplace"
    trigger: cron
    schedule: "a cada 2h"
    steps:
      - action: "Scheduler: Shopee → Amazon → ML (sequencial)"
      - action: "Collector grava coupon_snapshots no BigQuery"
      - boundary: scheduler-analyzer-detect
        action: "Scheduler chama Analyzer POST /detect-coupons"
      - action: "Analyzer diff snapshots e POST para C# /internal/coupon-alerts/evaluate"
      - action: "C# aplica regras e dedup (CouponAlertRules + History)"
    data_flow: ["write:bigquery:coupon_snapshots", "read:postgresql:CouponAlertRules", "write:postgresql:CouponAlertHistory"]

  coupon-alert-evaluation:
    name: "Avaliação de Alertas de Cupons"
    trigger: event
    steps:
      - action: "Analyzer detecta cupons novos/modificados via BigQuery diff"
      - action: "Analyzer POST /internal/coupon-alerts/evaluate no C# API"
      - action: "C# verifica match com regras ativas do tenant"
      - action: "C# aplica deduplicação (72h window)"
      - action: "C# registra em CouponAlertHistory"
    data_flow: ["read:bigquery:coupon_snapshots", "read:postgresql:CouponAlertRules", "write:postgresql:CouponAlertHistory"]

  dashboard-analytics:
    name: "Dashboard (Estatísticas e Evolução)"
    trigger: user
    steps:
      - boundary: api-analyzer-estatisticas
        action: "C# proxy → Analyzer (BigQuery agrupamentos)"
      - action: "Analyzer GET /evolucao com total_quedas/total_altas"
      - action: "C# query PostgreSQL → publicações recentes"
    data_flow: ["read:bigquery:snapshots", "read:postgresql:Publicacoes"]
