# golangci-lint configuration — Garimpei
# Docs: https://golangci-lint.run/usage/configuration/
# Rodar: golangci-lint run ./...

run:
  timeout: 3m
  # Inclui testes
  tests: true

linters:
  enable:
    # ── Correção de bugs (bloqueiam CI) ─────────────────────────────────
    - errcheck       # Erros não tratados (o mais importante!)
    - staticcheck    # Análise estática avançada (código morto, padrões incorretos)
    - govet          # go vet oficial
    - ineffassign    # Atribuições ineficazes (variável atribuída mas nunca lida)
    - typecheck      # Erros de tipo
    - unused         # Variáveis, funções e tipos não usados
    - gosimple       # Simplificações de código
    - revive         # Substituto moderno do golint (regras configuráveis)
    - bodyclose      # http.Response.Body não fechado
    - gosec          # Problemas de segurança (hardcoded creds, weak crypto)
    - gofmt          # Formatação padrão
    - goimports      # Imports organizados
    - funlen         # Funções com mais de N linhas (previne crescimento descontrolado)
    - cyclop         # Complexidade ciclomática alta
    # ── Qualidade de tratamento de erros (telemetria + observabilidade) ──
    - wrapcheck      # Erros de pacotes externos devem ser wrapped (contexto de onde veio)
    - errorlint      # Uso correto de errors.Is/As em vez de == (Go 1.13+)
    - err113         # Erros devem ser sentinel vars, não strings dinâmicas

linters-settings:
  errcheck:
    # Ignora erros de fmt.Print* e io.Copy (são intencionais)
    exclude-functions:
      - fmt.Fprintf
      - fmt.Printf
      - fmt.Println
      - (io.Closer).Close

  revive:
    rules:
      - name: exported
        disabled: true  # Não obrigar doc em tudo exportado (projeto pequeno)
      - name: var-naming
        disabled: false

  funlen:
    lines: 100
    statements: 60

  cyclop:
    max-complexity: 20

  gosec:
    excludes:
      - G104  # Ignora "unhandled error" (já coberto por errcheck)
      - G304  # File path from variable (necessário no projeto)
      - G404  # math/rand usado intencionalmente para exploração (não cripto)

  wrapcheck:
    # Só exige wrap para erros de pacotes EXTERNOS ao módulo.
    # Erros internos do projeto já têm contexto suficiente.
    ignoreSigs:
      - .Errorf(
      - errors.New(
      - errors.Unwrap(
      - errors.Join(
      - .Wrap(
      - .Wrapf(
      - .WithMessage(
      - .WithMessagef(
      - .WithStack(
    ignorePackageGlobs:
      - github.com/fmarquesfilho/garimpo/*

  errorlint:
    # Exige errors.Is() em vez de == para comparar erros
    comparison: true
    # Exige errors.As() em vez de type assertion
    asserts: true
    # Exige %w em vez de %v para wrapping em fmt.Errorf
    errorf: true

issues:
  # Não limitar número de issues reportadas
  max-issues-per-linter: 0
  max-same-issues: 0

  # ── Baseline de debt existente (T-0008) ────────────────────────────────
  # err113 e wrapcheck estão habilitados e bloqueiam código NOVO.
  # As 73 issues existentes são toleradas até o refactor T-0008.
  # Após T-0008, remover este bloco inteiro.
  exclude-rules:
    # Código de terceiros (node_modules contém Go de exemplo)
    - path: node_modules/
      linters:
        - cyclop
        - funlen
        - gosec
        - revive
        - wrapcheck
        - err113
    # Testes podem ter erros não tratados e funções longas
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - funlen
        - cyclop
        - wrapcheck
        - err113
        - errorlint
    # main.go e geradores CLI: erros vão para stderr + os.Exit
    - path: cmd/
      linters:
        - funlen
        - wrapcheck
        - err113
    # ── Debt existente (remover após T-0008) ──────────────────────────────
    - path: internal/alerts/
      linters: [err113, wrapcheck]
    - path: internal/publish/
      linters: [err113, wrapcheck]
    - path: internal/source/
      linters: [err113, wrapcheck]
    - path: internal/tenant/
      linters: [err113, wrapcheck]
    - path: internal/httpapi/(conversoes_sync|introspect|onboarding|resolver|shopee_resolver|whatsapp)\.go
      linters: [err113, wrapcheck]

severity:
  default: error
