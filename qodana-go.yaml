# Qodana for Go (Community — free)
# Runs JetBrains GoLand inspections in CI.
# Docs: https://www.jetbrains.com/help/qodana/golang.html

version: "1.0"

linter: jetbrains/qodana-go:2026.1-community

projectJDK: "go1.26"

include:
  - name: All

exclude:
  - name: All
    paths:
      - gen/
      - web/
      - node_modules/
      - vendor/

failThreshold: 0
