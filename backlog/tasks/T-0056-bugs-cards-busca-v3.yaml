valor: |
  A v3 da state machine funciona logicamente (294 testes passam), mas a UI
  apresenta vários problemas visuais e de dados que degradam a experiência.
  São bugs de binding e de contrato API↔frontend.

  ## Atualização 2026-07-12 (pós-Omnibox / T-0055)

  A BuscaEngine (FSM headless) continua sólida e foi reusada sem alterações pelo
  Omnibox — feedback do dono do produto: **"a engine looks good"**. As demais
  partes da página estão "getting there".

  ⚠️ **PENDENTE — o workflow de lojas (store) precisa de refactor e correção.**
  É o ponto fraco atual da página Descobrir. Sintomas/áreas a revisar:
    - Resolução/adição de loja (via `@loja` no omnibox e via link/ID) e o
      caminho `ADICIONAR_LOJA` (monitorada vs. resolver nova via Collector).
    - Nomes de loja com espaço (`Glory of Seoul`) não casam com token sem espaço
      (`@glory` casa por match parcial; `@gloryofseoul` não) — a UX de completar
      loja no omnibox contorna removendo o token e mostrando card, mas o modelo
      de dados/derivação de lojas monitoradas (`listarLojasMonitoradas` a partir
      de buscas salvas) e o escopo por loja (`shopIds` × marketplace) merecem
      um desenho mais consistente.
    - Estados `lojaResolvendo`/`lojaErro` e o fluxo de "loja nova por URL/ID".
  Recomenda-se uma task dedicada de refactor do subsistema de lojas (escopo,
  resolução, nomes, monitoramento) antes de novas features de busca.
descricao: |
  ## Bugs identificados e corrigidos

  ### 1. Nomes de loja mostrando IDs numéricos ou keywords ✅

  **Fix aplicado:**
  - Backend: novo campo `ShopNames` (Dict<string,string>) na entidade `Busca`
  - API: GET /api/buscas retorna `shop_names` (dict id→nome) em vez de `nome`
  - API: POST /api/buscas aceita e persiste `shop_names`
  - Frontend: `payloadToConfig` usa `busca.shop_names` diretamente (mapeia todos os IDs)
  - Frontend: `configToPayload` envia `shop_names` ao salvar
  - Migration EF Core: `AddBuscaShopNames` (coluna jsonb)
  - Fallback legacy: buscas antigas sem ShopNames usam Keyword como nome

  ### 2. Título dos BuscaCard estranho ✅

  **Fix aplicado:** Removido o título bold (`gerarLabelBusca`) do BuscaCard.
  O card agora mostra diretamente as seções (keywords badges, categorias, lojas,
  marketplaces) + cron badge inline na primeira seção presente.

  ### 3. Cards ocupam muito espaço vertical ✅

  **Fix aplicado:** Layout compacto:
  - Removidos labels de 74px (palavras/categorias/lojas/marketplaces)
  - Gap reduzido de 1.5 para 1
  - Padding reduzido de py-2.5 para py-2
  - Seções em flex inline com items-center
  - Footer mt/pt reduzidos

  ### 4. Buscas sem keyword não retornam resultados ✅

  **Fix aplicado:** `/api/candidatos` agora aceita `fonte=shopee-shop&shop_ids=...`
  e roteia para `FetchShop` no Collector (sem exigir keyword).
  - Quando só tem categorias: `buildCuradoriaParams` já usava cat0 como keyword
  - Quando só tem loja: path de `shopIds.length > 0` usa FetchShop via API

  ### 5. Falta task mise para limpar bancos ✅

  **Fix aplicado:** `.mise/tasks/db/reset` criado com:
  - Truncate de todas tabelas de dados (preserva Tenants/TenantConfigs)
  - Confirmação interativa (digitar 'reset')
  - Suporte a variáveis de ambiente PGHOST/PGPORT/PGDATABASE/PGUSER

  ## Arquivos modificados

  - `web/src/lib/busca-unificada-logic.js` — payloadToConfig usa shop_names
  - `web/src/lib/components/BuscaCard.svelte` — layout compacto, sem título
  - `src/Garimpei.Api/Endpoints/BuscasEndpoints.cs` — retorna shop_names
  - `src/Garimpei.Api/Endpoints/CoreEndpoints.cs` — FetchShop para shop-only
  - `src/Garimpei.Domain/Entities/Busca.cs` — campo ShopNames
  - `src/Garimpei.Infrastructure/Persistence/AppDbContext.cs` — JSON conversion
  - `web/src/lib/busca-engine-effects.js` — buildBuscasComLojas usa shop_names
  - `web/src/lib/descobrir.js` — fallback shop_names em carregarProdutosLojas
  - `.mise/tasks/db/reset` — novo script

criterios_aceite:
