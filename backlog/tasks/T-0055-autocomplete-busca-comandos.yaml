valor: |
  O input de busca hoje é texto livre sem indicação de escopo. Com o parser de
  tokens, o usuário compõe buscas complexas de forma natural (como CLI/Slack):
  `serum @lebotanic #beleza !shopee`. Melhora descobribilidade e reduz cliques.
descricao: |
  Implementar parser de tokens no input principal da página Descobrir.
  O input funciona como uma mini-CLI onde prefixos ativam completions contextuais.

  ## Gramática

  ```
  <input> ::= <token>*
  <token> ::= <keyword> | <loja> | <categoria> | <marketplace>

  <keyword>     ::= texto sem prefixo (busca global ou escopada)
  <loja>        ::= "@" <nome_loja>     (escopa para loja monitorada)
  <categoria>   ::= "#" <nome_cat>      (filtra por categoria)
  <marketplace> ::= "!" <nome_mp>       (filtra marketplace)
  ```

  ## Exemplos

  | Input | Interpretação |
  |-------|---------------|
  | `serum` | keyword global |
  | `serum @lebotanic` | keyword escopada na loja Le Botanic |
  | `serum @lebotanic #beleza` | keyword + loja + categoria |
  | `@lebotanic` | todos os produtos da loja (intent: loja_completa) |
  | `#perfumaria` | só categoria (intent: só-categorias) |
  | `serum !shopee !amazon` | keyword + filtro 2 marketplaces |
  | `@glory #cuidados !shopee` | loja + categoria + marketplace (sem keyword) |

  ## Comportamento do autocomplete

  1. Após 2+ chars de um token, dropdown aparece com sugestões filtradas:
     - `@le` → mostra "Le Botanic", "Le Salon" (lojas monitoradas)
     - `#per` → mostra "Perfumaria", "Perfumes" (categorias)
     - `!sh` → mostra "shopee" (marketplaces)
     - `ser` → mostra "serum em toda Shopee", "serum nas lojas", busca salva match

  2. Tab ou click seleciona sugestão → completa o token
  3. Enter → executa busca com todos os tokens parseados
  4. Espaço após token completo → pronto para próximo token

  ## Decisão de UX: texto literal

  O input mostra o texto como digitado ("serum @lebotanic #beleza"), sem
  transformar tokens em chips visuais. Motivo: simplicidade de implementação,
  composabilidade, e familiaridade com CLIs.

  Os chips/cards visuais correspondentes (LojaCard, CategoriaCard) aparecem
  nas raias abaixo — que já existem. O input é o "compositor", as raias são
  a "visualização" do estado resultante.

  ## Regras em rules/busca-rules.json

  ```json
  "autocomplete": {
    "prefixos": {
      "@": { "tipo": "loja", "fonte": "lojasDisponiveis", "campo": "nome" },
      "#": { "tipo": "categoria", "fonte": "categoriasDisponiveis", "campo": "nome" },
      "!": { "tipo": "marketplace", "fonte": "marketplaces.suportados" }
    },
    "minChars": 2,
    "maxSugestoes": 7,
    "matchBuscaSalva": true
  }
  ```

  ## Implementação

  ### Funções puras (busca-config.js)

  1. `parsearInput(raw)` — tokeniza string em array de {tipo, valor, completo}
  2. `gerarSugestoes(tokens, ctx, rules)` — gera lista de completions para o
     último token incompleto
  3. `tokensParaContexto(tokens)` — converte tokens parseados em contexto
     da engine (keyword, shopIds, categorias, marketplacesFiltro)

  ### Componente (AutocompleteInput.svelte)

  - Bits UI Combobox com `open` controlado
  - Items customizados (ícone prefixo + nome + dica)
  - Keyboard: Tab completa, Enter executa, Esc fecha
  - Integra com BuscaEngine via event `APLICAR_TOKENS`

  ### Engine

  - Novo event: `APLICAR_TOKENS` (recebe tokens parseados, atualiza ctx completo)
  - Alternativa: manter `DIGITAR` + detectar prefixos no handler

  ## Testes

  - Unit: `parsearInput` (todas as combinações de gramática)
  - Unit: `gerarSugestoes` (filtra por contexto, respeita minChars)
  - Unit: `tokensParaContexto` (mapeia tokens → estado da engine)
  - E2E: digitar `serum @` → dropdown com lojas; selecionar → escopa busca

  ## Referências

  - ADR-0027 seção 5: padrão de features declarativas no JSON
  - Bits UI Combobox: componente base (já usado para lojas/categorias)
  - Inspiração: Slack (menções @), Linear (filtros), Notion (comandos /)

criterios_aceite:
  - Parser tokeniza corretamente @loja, #categoria, !marketplace e keyword
  - Autocomplete aparece após 2+ chars de um token com prefixo
  - Sugestões filtram por match parcial case-insensitive
  - Selecionar sugestão completa o token e atualiza estado da engine
  - Enter executa busca com todos os tokens interpretados
  - Match com busca salva aparece como primeira sugestão (se existir)
  - Regras declaradas em rules/busca-rules.json
  - Testes unitários para parser, sugestões, e mapeamento de tokens
  - Funciona com 0 lojas/categorias (só mostra keyword global)

