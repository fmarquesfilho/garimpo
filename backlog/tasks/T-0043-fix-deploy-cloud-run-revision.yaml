descricao: |
  ## Problema 1: JsonNamingPolicy nĂ£o aplicada a requests

  O `ConfigureHttpJsonOptions` com `SnakeCaseLower` configura a serializaĂ§Ă£o
  (output) corretamente mas NĂƒO garante a deserializaĂ§Ă£o (input) em ASP.NET
  Minimal APIs para todos os cenĂ¡rios. Campos como `destino_id`, `template_id`,
  `legenda_custom` chegavam null ao backend.

  ### EvidĂªncia
  - `POST /api/publicar '{"destino_id":"@mileseleciona"}'` â†’ publisher recebia GroupId vazio
  - `POST /api/publicar '{"DestinoId":"@mileseleciona"}'` â†’ funcionava (PascalCase)

  ### Fix
  Adicionar `[JsonPropertyName("destino_id")]` explĂ­cito em TODOS os campos
  dos records `AgendarPublicacaoRequest` e `PublicarRequest`.

  ### PrevenĂ§Ă£o
  Teste unitĂ¡rio `JsonBindingTests.cs` que deserializa JSON snake_case e valida
  que os campos chegam corretamente â€” roda no prepush.

  ## Problema 2: Cloud Run nĂ£o criava nova revision

  O `deploy/cloud-run-deploy-now.yaml` usa tag `:latest`. O Cloud Run compara
  o **digest** da imagem â€” se `:latest` resolve para o mesmo digest que jĂ¡ estĂ¡
  deployado, NĂƒO cria nova revision. Resultado: cĂ³digo novo no Artifact Registry
  mas a instĂ¢ncia antiga continua rodando.

  ### EvidĂªncia
  - Imagem nova pushed Ă s 18:54, mas revision mais recente era de 02/07
  - `gcloud run services replace` retornava sucesso sem criar revision

  ### Fix
  No CI, substituir `:latest` por `:${{ github.sha }}` no YAML antes do deploy.
  Cada push gera um digest Ăºnico â†’ sempre nova revision.

  ### PrevenĂ§Ă£o
  - Removido paths-filter no deploy (rebuilda sempre, cache torna rĂ¡pido)
  - Tags SHA garantem unicidade

  ## Problema 3: Acesso Ă  API de produĂ§Ă£o para debug

  NĂ£o havia forma de testar a API autenticada de produĂ§Ă£o a partir da CLI.

  ### Fix
