id: T-0049
titulo: "Reconciliação: sincronizar buscas existentes no PG com Scheduler"
epic: backend
status: next
prioridade: alta
estimativa: S
sprint: "2026-S28"
valor: >
  Buscas criadas antes da integração com Scheduler (pré sessão 07/07)
  existem no PostgreSQL mas não têm job registrado no Scheduler.
  Criar endpoint ou script que lê todas as buscas ativas com ShopIds
  e registra os jobs correspondentes via SetSchedule.
criterios:
  - "Endpoint POST /internal/reconcile-schedules ou mise task"
  - "Para cada Busca ativa com ShopIds: chama SetSchedule se job não existe"
  - "Logs indicam quantos jobs foram criados/atualizados"
  - "Idempotente: rodar 2x não cria duplicatas"
  - "Rodar uma vez em produção para sincronizar buscas existentes"
depende_de: []
tags: [backend, scheduler, reconciliacao]
criada_em: "2026-07-07"
atualizada_em: "2026-07-07"
