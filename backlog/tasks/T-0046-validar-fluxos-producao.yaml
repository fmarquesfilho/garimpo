id: T-0046
titulo: "Validar todos os 11 fluxos end-to-end em produção"
epic: qualidade
status: next
prioridade: alta
estimativa: M
sprint: "2026-S28"
valor: >
  Exercitar cada um dos 11 fluxos documentados em docs/08-fluxos-sequencia.md
  diretamente em produção (garimpei.app.br), documentando resultado e
  corrigindo qualquer falha encontrada.
criterios:
  - "Fluxo 1 (Descobrir): buscar por keyword → candidatos rankeados aparecem"
  - "Fluxo 2 (Publicar): enviar produto → mensagem chega no Telegram com link curto"
  - "Fluxo 2.1 (Agendada): agendar → mensagem chega no horário correto"
  - "Fluxo 3 (Coleta): aguardar 8h → snapshots no BigQuery (query direta)"
  - "Fluxo 4 (Novidades): após 2 coletas → /lojas/novidades retorna dados reais"
  - "Fluxo 5 (Adicionar loja): link curto + direto + username → todos resolvem"
  - "Fluxo 6 (Cupons): coleta automática funcionando (scheduler logs)"
  - "Fluxo 7 (Publicar variação): clicar 📤 na aba Preços → publica"
  - "Fluxo 8 (Onboarding): fluxo multi-step completo sem erro"
  - "Fluxo 9 (Dashboard): estatísticas carregam com dados reais"
  - "Fluxo 10 (Resolver link): colar link curto na página publicar → preenche dados"
  - "Fluxo 11 (Canais): adicionar/editar/remover destino Telegram"
depende_de: [T-0045]
