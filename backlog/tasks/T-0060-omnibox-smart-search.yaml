valor: |
  Evolui o Omnibox para inferir intencao do usuario a partir de texto livre.
  O dropdown mostra opcoes contextuais (Pesquisar Produtos, Pesquisar Lojas,
  Resolver Link, Categoria) sem depender de prefixos. Inclui Store Cards com
  dados enriquecidos (imagem, seguidores, bandeira de origem) e monitoramento
  inline.

  Mudanca arquitetural: a BuscaEngine se torna o controlador unico de toda a
  UI (padrao Headless UI Controller). Componentes viram renderizadores puros.
  Comportamento configuravel via JSON, verificavel em CI, observavel via OTel.

  Spec: .kiro/specs/omnibox-smart-search/
  ADR: docs/decisoes/0033-headless-ui-controller-omnibox.md
descricao: |
  14 tasks em 6 waves. Todas concluidas.
  Infra ja implementada (proto + Collector + C# response enriquecido).
criterios_aceite:
  - "Digitar texto livre mostra opcoes de intencao (Produtos, Lojas, Categoria)"
  - "Colar link mostra Resolver Link e gera Store Card com imagem"
  - "Pesquisar em Lojas retorna Store Cards com dados enriquecidos"
  - "Monitorar loja inline (sem scroll pro topo)"
  - "Prefixos (@, #, !) continuam funcionando como antes"
