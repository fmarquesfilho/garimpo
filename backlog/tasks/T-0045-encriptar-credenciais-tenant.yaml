sprint: "2026-S28"
valor: >
  Credenciais (Secret Shopee, Token Telegram, Token WhatsApp) são salvas em
  plaintext no PostgreSQL. Devem ser encriptadas com ENCRYPTION_KEY antes de
  persistir e decriptadas ao usar. Também wiring dos alertas de cupons → Telegram.
criterios:
  - "ShopeeSecretEnc, TelegramTokenEnc, WhatsappTokenEnc salvos encriptados"
  - "Decriptação transparente ao usar (C# middleware ou service)"
  - "Alertas de cupons wired: detecção → Publisher gRPC → Telegram do tenant"
  - "POST /api/alertas/testar envia mensagem real ao Telegram"
