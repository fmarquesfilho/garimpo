# arch-go — Regras de Arquitetura do Garimpei
# Docs: https://github.com/arch-go/arch-go
# Rodar: arch-go
#
# Protege a regra de dependência: camadas internas não importam camadas externas.
# Se algum dev importar httpapi dentro de domain, o CI falha.

version: 1

threshold:
  compliance: 100    # 100% das regras devem passar
  coverage: 30       # Packages cobertos (cresce conforme adicionamos regras)

excludedPackages:
  - "github.com/fmarquesfilho/garimpo/gen/**"

dependenciesRules:
  # ── domain: núcleo puro, sem dependências externas ────────────────────
  - package: "github.com/fmarquesfilho/garimpo/internal/domain"
    shouldOnlyDependsOn:
      internal:
        - "github.com/fmarquesfilho/garimpo/internal/domain"  # só ele mesmo

  # ── source: depende de domain (adapter) ───────────────────────────────
  - package: "github.com/fmarquesfilho/garimpo/internal/source"
    shouldNotDependsOn:
      internal:
        - "github.com/fmarquesfilho/garimpo/internal/httpapi"
        - "github.com/fmarquesfilho/garimpo/internal/store"
        - "github.com/fmarquesfilho/garimpo/internal/publish"

  # ── engine/strategy/scoring: lógica de negócio ─────────────────────────
  - package: "github.com/fmarquesfilho/garimpo/internal/engine"
    shouldNotDependsOn:
      internal:
        - "github.com/fmarquesfilho/garimpo/internal/httpapi"
        - "github.com/fmarquesfilho/garimpo/internal/store"

  - package: "github.com/fmarquesfilho/garimpo/internal/strategy"
    shouldNotDependsOn:
      internal:
        - "github.com/fmarquesfilho/garimpo/internal/httpapi"
        - "github.com/fmarquesfilho/garimpo/internal/store"
        - "github.com/fmarquesfilho/garimpo/internal/source"

  # ── store: persistência, não importa httpapi ──────────────────────────
  - package: "github.com/fmarquesfilho/garimpo/internal/store"
    shouldNotDependsOn:
      internal:
        - "github.com/fmarquesfilho/garimpo/internal/httpapi"
        - "github.com/fmarquesfilho/garimpo/internal/source"
        - "github.com/fmarquesfilho/garimpo/internal/engine"

  # ── tenant: depende de store (adapter) mas não de httpapi ──────────────
  - package: "github.com/fmarquesfilho/garimpo/internal/tenant"
    shouldNotDependsOn:
      internal:
        - "github.com/fmarquesfilho/garimpo/internal/httpapi"
        - "github.com/fmarquesfilho/garimpo/internal/source"
        - "github.com/fmarquesfilho/garimpo/internal/engine"

  # ── apperr: erros de domínio, sem dependências internas ────────────────
  - package: "github.com/fmarquesfilho/garimpo/internal/apperr"
    shouldOnlyDependsOn:
      internal:
        - "github.com/fmarquesfilho/garimpo/internal/apperr"  # só ele mesmo

  # ── crypto: leaf, depende apenas de apperr ─────────────────────────────
  - package: "github.com/fmarquesfilho/garimpo/internal/crypto"
    shouldOnlyDependsOn:
      internal:
        - "github.com/fmarquesfilho/garimpo/internal/crypto"
        - "github.com/fmarquesfilho/garimpo/internal/apperr"

  # ── services (microserviços gRPC): dependem de internal + gen ──────────
  - package: "github.com/fmarquesfilho/garimpo/services/collector"
    shouldNotDependsOn:
      internal:
        - "github.com/fmarquesfilho/garimpo/internal/httpapi"
        - "github.com/fmarquesfilho/garimpo/internal/publish"
        - "github.com/fmarquesfilho/garimpo/internal/scheduler"

  - package: "github.com/fmarquesfilho/garimpo/services/publisher"
    shouldNotDependsOn:
      internal:
        - "github.com/fmarquesfilho/garimpo/internal/httpapi"
        - "github.com/fmarquesfilho/garimpo/internal/source"
        - "github.com/fmarquesfilho/garimpo/internal/scheduler"

  - package: "github.com/fmarquesfilho/garimpo/services/alerter"
    shouldNotDependsOn:
      internal:
        - "github.com/fmarquesfilho/garimpo/internal/httpapi"
        - "github.com/fmarquesfilho/garimpo/internal/source"
        - "github.com/fmarquesfilho/garimpo/internal/publish"
        - "github.com/fmarquesfilho/garimpo/internal/scheduler"

  - package: "github.com/fmarquesfilho/garimpo/services/scheduler"
    shouldNotDependsOn:
      internal:
        - "github.com/fmarquesfilho/garimpo/internal/httpapi"
        - "github.com/fmarquesfilho/garimpo/internal/store"
        - "github.com/fmarquesfilho/garimpo/internal/publish"
