syntax = "proto3";

package collector.v1;

option go_package = "github.com/fmarquesfilho/garimpo/gen/go/collector/v1;collectorv1";
option csharp_namespace = "Garimpei.Protos.Collector.V1";

// Marketplace identifica a origem dos produtos.
enum Marketplace {
  MARKETPLACE_UNSPECIFIED = 0;
  MARKETPLACE_SHOPEE = 1;
  MARKETPLACE_AMAZON = 2;
  MARKETPLACE_MERCADOLIVRE = 3;
}

service CollectorService {
  // Resolve shop ID by username or URL.
  rpc ResolveShop(ResolveShopRequest) returns (ResolveShopResponse);
  // Generate affiliate tracking link via marketplace API (e.g., Shopee generateShortLink).
  rpc GenerateAffiliateLink(GenerateAffiliateLinkRequest) returns (GenerateAffiliateLinkResponse);
  // Fetch products by search keyword from a given marketplace (pure read, no side-effects).
  rpc Fetch(FetchRequest) returns (FetchResponse);
  // Fetch all products from a specific shop (pure read, no side-effects).
  rpc FetchShop(FetchShopRequest) returns (FetchShopResponse);
  // Collect: search products AND persist snapshot to BigQuery (keyword or shop).
  rpc Collect(CollectRequest) returns (CollectResponse);
}

message FetchRequest {
  string keyword = 1;
  int32 limit = 2;
  string sort_by = 3; // relevance, sales, price
  string owner_uid = 4;
  // Marketplace to search. Defaults to SHOPEE when unspecified.
  Marketplace marketplace = 5;
}

message FetchShopRequest {
  int64 shop_id = 1;
  int32 limit = 2;
  string owner_uid = 3;
  // Marketplace of the shop. Defaults to SHOPEE when unspecified.
  Marketplace marketplace = 4;
}

message ResolveShopRequest {
  string username_or_url = 1;
  Marketplace marketplace = 2;
}

message ResolveShopResponse {
  int64 shop_id = 1;
  string shop_name = 2;
  // Campos enriquecidos (Shopee get_shop_detail — opcionais para outros marketplaces)
  int32 follower_count = 3;
  int32 item_count = 4;
  double rating_star = 5;
  string image_url = 6;      // avatar/portrait da loja
  string cover_url = 7;      // imagem de capa
  string shop_location = 8;  // localização registrada (cidade/estado)
  string description = 9;    // bio da loja
}

// GenerateAffiliateLink — gera link curto de afiliada via Shopee generateShortLink.
// SubIds são usados para rastrear conversões (voltam no conversionReport.utmContent).
message GenerateAffiliateLinkRequest {
  // URL original do produto ou loja (ex: https://shopee.com.br/product/123/456).
  string original_url = 1;
  // Sub IDs para tracking de conversão (máx 5). Ex: ["canal", "estrategia", "20260706"].
  repeated string sub_ids = 2;
  // Marketplace (default: SHOPEE).
  Marketplace marketplace = 3;
  // Owner UID do tenant (para buscar credenciais de afiliado).
  string owner_uid = 4;
}

message GenerateAffiliateLinkResponse {
  // Link curto gerado pela API do marketplace.
  string short_link = 1;
  // Link longo original com parâmetros de afiliação (fallback se short_link falhar).
  string long_link = 2;
}

message FetchResponse {
  repeated Product products = 1;
  int32 total_found = 2;
  string fetched_at = 3; // RFC3339
}

message FetchShopResponse {
  repeated Product products = 1;
  int32 total_found = 2;
  string fetched_at = 3; // RFC3339
}

message Product {
  int64 item_id = 1;
  int64 shop_id = 2;
  string name = 3;
  double price = 4;
  double original_price = 5;
  int32 sold = 6;
  double rating = 7;
  string image_url = 8;
  string product_url = 9;
  string shop_name = 10;
  double discount_percent = 11;
  double commission = 12;
  string category = 13;
  string link = 14;
  // Marketplace from which this product was collected.
  Marketplace marketplace = 15;
}

// ─── Collect: search + persist snapshot ──────────────────────────────────────

// CollectRequest searches products and persists the results as a BigQuery snapshot.
// Uses oneof target to support both keyword search and shop fetch in a single RPC.
message CollectRequest {
  oneof target {
    // Search by keyword — snapshot keyword field = this literal value.
    string keyword = 1;
    // Fetch by shop — snapshot keyword field = shop_id as string.
    int64 shop_id = 6;
  }
  int32 limit = 2;        // 1-500, default 50
  string sort_by = 3;     // relevance, sales, price
  string owner_uid = 4;   // tenant UID (required for scoping)
  Marketplace marketplace = 5;
  // UUID estável da busca que originou esta coleta. Obrigatório.
  // Rejeitado com InvalidArgument se vazio.
  string busca_id = 7;
}

// CollectResponse returns the collected products and indicates persistence status.
message CollectResponse {
  repeated Product products = 1;
  int32 total_found = 2;
  string fetched_at = 3;  // RFC3339
  // True if the snapshot was accepted for export to BigQuery.
  // False if exporter is disabled or buffer was full.
  bool persisted = 4;
}
