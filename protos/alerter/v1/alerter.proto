syntax = "proto3";

package alerter.v1;

option go_package = "github.com/fmarquesfilho/garimpo/gen/go/alerter/v1;alerterv1";
option csharp_namespace = "Garimpei.Protos.Alerter.V1";

service AlerterService {
  // Check product snapshots and notify if thresholds are met
  rpc CheckAndNotify(CheckAndNotifyRequest) returns (CheckAndNotifyResponse);
  // Send coupon-specific alerts to Telegram/WhatsApp
  rpc SendCouponAlert(SendCouponAlertRequest) returns (SendCouponAlertResponse);
}

message CheckAndNotifyRequest {
  string owner_uid = 1;
  repeated AlertRule rules = 2;
}

message AlertRule {
  string rule_id = 1;
  string keyword = 2;
  double price_threshold = 3;
  double discount_min_percent = 4;
  string channel = 5; // telegram
  string group_id = 6;
}

message CheckAndNotifyResponse {
  int32 alerts_sent = 1;
  repeated AlertResult results = 2;
}

message AlertResult {
  string rule_id = 1;
  bool triggered = 2;
  int32 products_matched = 3;
  string notified_at = 4; // RFC3339
}

// ─── Coupon Alert Messages ──────────────────────────────────────────────

message SendCouponAlertRequest {
  string owner_uid = 1;
  string channel = 2;           // "telegram" or "whatsapp"
  string group_id = 3;          // chat_id or phone_number_id
  repeated CouponAlertPayload coupons = 4;
}

message CouponAlertPayload {
  string coupon_id = 1;
  string marketplace = 2;
  string discount_description = 3; // "20% OFF" or "R$15 de desconto"
  double min_spend = 4;
  string start_time = 5;
  string end_time = 6;
  repeated string categories = 7;
  string link_or_code = 8;
  bool expires_soon = 9;        // end_time within 24h
  string affiliate_link = 10;   // tenant's affiliate-tagged URL
}

message SendCouponAlertResponse {
  bool delivered = 1;
  string notified_at = 2; // RFC3339
}
