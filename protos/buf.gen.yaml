version: v2
managed:
  enabled: true
plugins:
  # Go
  - remote: buf.build/protocolbuffers/go
    out: ../gen/go
    opt: paths=source_relative
  - remote: buf.build/grpc/go
    out: ../gen/go
    opt: paths=source_relative
  # C#
  - remote: buf.build/protocolbuffers/csharp
    out: ../src/Garimpei.Protos/Generated
  - remote: buf.build/grpc/csharp
    out: ../src/Garimpei.Protos/Generated
